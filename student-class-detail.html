<!DOCTYPE html>
<html>
<head>
    <title>รายละเอียดห้องเรียน - Python Learning Platform</title>
    <link rel="stylesheet" href="student-class-detail.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://www.python.org/static/community_logos/python-logo-generic.svg" class="python-logo">
            <h1>รายละเอียดห้องเรียน</h1>
            <button onclick="window.history.back()" class="back-btn">กลับ</button>
        </div>

        <!-- ข้อมูลห้องเรียน -->
        <div class="section class-info">
            <h2 id="className">ชื่อห้องเรียน</h2>
            <p id="classCode">รหัสห้องเรียน:</p>
            <p id="teacherName">ผู้สอน:</p>
        </div>

        <!-- สถิติ -->
        <div class="stats">
            <div class="stat-card">
                <div id="totalProblems" class="stat-number">0</div>
                <div>โจทย์ทั้งหมด</div>
            </div>
            <div class="stat-card">
                <div id="completedProblems" class="stat-number">0</div>
                <div>โจทย์ที่ทำสำเร็จ</div>
            </div>
            <div class="stat-card">
                <div id="problemProgress" class="stat-number">0%</div>
                <div>ความคืบหน้า</div>
            </div>
        </div>

        <!-- รายการโจทย์ -->
        <div class="section">
            <div class="section-header">
                <h2>โจทย์ในห้องเรียน</h2>
                <div class="search-box">
                    <input type="text" id="searchProblem" placeholder="ค้นหาโจทย์..." class="search-input">
                </div>
            </div>
            
            <div id="problemList" class="problem-list">
                <!-- รายการโจทย์จะถูกเพิ่มที่นี่ด้วย JavaScript -->
            </div>
        </div>

        <!-- แสดงความคืบหน้า -->
        <div class="section">
            <h2>ความคืบหน้าของฉัน</h2>
            <div class="progress-chart">
                <canvas id="progressChart"></canvas>
            </div>
        </div>
    </div>

    <!-- เพิ่ม Chart.js สำหรับแสดงกราฟ -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="student-class-detail.js"></script>
</body>
</html>
