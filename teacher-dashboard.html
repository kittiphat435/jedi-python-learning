<!DOCTYPE html>
<html>

<head>
    <title>Teacher Dashboard - Python Learning Platform</title>
    <link rel="stylesheet" href="teacher-dashboard.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <img src="https://www.python.org/static/community_logos/python-logo-generic.svg" alt="Python Logo"
                class="python-logo">
            <h1>Teacher Dashboard</h1>
            <img src="https://www.gstatic.com/mobilesdk/160503_mobilesdk/logo/2x/firebase_28dp.png" alt="Firebase Logo"
                class="firebase-logo">
        </div>

        <!-- ข้อมูลผู้ใช้ -->
        <div class="user-info">
            <div>
                <span id="userEmail"></span>
                <div id="displayName">
                    <span id="userName"></span>
                    <button id="editNameBtn" class="edit-btn">แก้ไขชื่อ</button>
                </div>
                <div id="editNameForm" style="display: none;">
                    <input type="text" id="newName" class="input-field" placeholder="ใส่ชื่อที่ต้องการ">
                    <button id="saveNameBtn" class="primary-btn">บันทึก</button>
                    <button id="cancelEditBtn" class="secondary-btn">ยกเลิก</button>
                </div>
            </div>
            <button id="logoutBtn" class="logout-btn">ออกจากระบบ</button>
        </div>

        <!-- สร้างห้องเรียน -->
        <div class="section">
            <h2>สร้างห้องเรียนใหม่</h2>
            <input type="text" id="className" placeholder="ชื่อห้องเรียน" class="input-field">
            <button id="createClassBtn" class="primary-btn">สร้างห้องเรียน</button>
        </div>

        <!-- รายการห้องเรียน -->
        <div class="section">
            <h2>ห้องเรียนของฉัน</h2>
            <div id="classList" class="class-list">
                <!-- รายการห้องเรียนจะถูกเพิ่มที่นี่ด้วย JavaScript -->
            </div>
        </div>

        <!-- คลังโจทย์ -->
        <div class="section">
            <h2>คลังโจทย์</h2>
            <button id="createProblemBtn" class="primary-btn">สร้างโจทย์ใหม่</button>
            <div id="problemList" class="problem-list">
                <!-- รายการโจทย์จะถูกเพิ่มที่นี่ -->
            </div>
        </div>
    </div>

    <!-- Modal สร้างโจทย์ -->
    <div id="problemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>สร้างโจทย์ใหม่</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>

            <div class="modal-body">
                <form id="problemForm">
                    <!-- ข้อมูลพื้นฐาน -->
                    <div class="form-group">
                        <label>ชื่อโจทย์ *</label>
                        <input type="text" id="problemTitle" class="input-field" required>
                    </div>

                    <div class="form-group">
                        <label>ประเภทโจทย์ *</label>
                        <select id="problemType" class="input-field" onchange="toggleProblemTypeFields()">
                            <option value="python">Python Programming</option>
                            <option value="comprehension">คำถามความเข้าใจ</option>
                        </select>
                    </div>


                    <div class="form-group">
                        <label>ระดับความยาก</label>
                        <select id="problemDifficulty" class="input-field">
                            <option value="easy">ง่าย</option>
                            <option value="medium">ปานกลาง</option>
                            <option value="hard">ยาก</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>รูปภาพประกอบ (URL ของรูปภาพ, ไม่บังคับ)</label>
                        <div class="image-input-container">
                            <input type="text" id="problemImage" class="input-field"
                                placeholder="https://example.com/image.jpg" onchange="previewImage()">
                            <button type="button" class="preview-btn" onclick="previewImage()">ดูตัวอย่าง</button>
                        </div>
                        <div id="imagePreview" class="image-preview"></div>
                    </div>



                    <div id="pythonSection">
                        <!-- คำอธิบายโจทย์ -->
                        <div id="explanGroup" class="form-group">
                            <label>คำอธิบายโจทย์ *</label>
                            <textarea id="problemDescription" class="input-field" required></textarea>
                        </div>


                        <!-- รูปแบบ Input/Output -->
                        <div id="inputFormatGroup" class="form-group">
                            <label>รูปแบบ Input</label>
                            <textarea id="inputFormat" class="input-field" placeholder="อธิบายรูปแบบ input ที่โจทย์ต้องการ เช่น:
    เลขตัวที่ 1: [ตัวเลขตัวที่ 1]
    เลขตัวที่ 2: [ตัวเลขตัวที่ 2]"></textarea>
                        </div>

                        <div id="outputFormatGroup" class="form-group">
                            <label>รูปแบบ Output</label>
                            <textarea id="outputFormat" class="input-field" placeholder="อธิบายรูปแบบ output ที่ต้องการ เช่น:
    ผลบวก x + y = 8"></textarea>
                        </div>

                        <!-- ตัวอย่าง -->
                        <div id="exampleGroup" class="form-group">
                            <label>ตัวอย่าง</label>
                            <textarea id="example" class="input-field" placeholder="ยกตัวอย่างการทำงานของโปรแกรม เช่น:
    Input:
    เลขตัวที่ 1: 2
    เลขตัวที่ 2: 6
    Output:
    ผลบวก 2 + 6 = 8"></textarea>
                        </div>



                        <div id="templateCodeGroup" class="form-group">
                            <label>โค้ดเริ่มต้น *</label>
                            <textarea id="templateCode" class="code-editor" required></textarea>
                        </div>

                        <!-- Test Cases -->
                        <div id="testCasesSection" class="test-cases">
                            <div class="test-cases-header">
                                <h3>Test Cases</h3>
                                <button type="button" class="primary-btn" onclick="addTestCase()">+ เพิ่ม Test
                                    Case</button>
                            </div>
                            <div id="testCasesList"></div>
                        </div>
                    </div>


                    <div id="comprehensionContentGroup" class="form-group" style="display: none;">
                        <label>คำอธิบายโจทย์ *</label>
                        <textarea id="comprehensionContent" class="input-field content-editor"
                            placeholder="ใส่เนื้อหาหรือบทความที่ต้องการให้นักเรียนอ่าน"></textarea>
                    </div>



                    <div id="questionsSection" class="questions" style="display: none;">

                        <div class="questions-header">
                            <h3>คำถาม</h3>
                            <button type="button" class="primary-btn" onclick="addComprehensionQuestion()">
                                เพิ่มคำถาม
                            </button>
                        </div>




                        <div id="questionsList"></div>


                    </div>


            </div>
            </form>
            <div class="modal-footer">
                <button type="button" onclick="closeModal()" class="secondary-btn">ยกเลิก</button>
                <button type="button" onclick="saveProblem()" class="primary-btn">บันทึก</button>
            </div>
        </div>


    </div>


    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="teacher-dashboard.js"></script>
</body>

</html>
