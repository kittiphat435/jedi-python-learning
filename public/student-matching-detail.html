<!DOCTYPE html>
<html>

<head>
    <title>โจทย์จับคู่</title>
    <link rel="stylesheet" href="student-matching-detail.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Main Header with Dark Theme -->
        <div class="header dark-theme">
            <div class="logo-section">
                <img src="logo.png" alt="JediCode Logo" class="main-logo">
                <div class="brand-text">
                    <h1>JediCode</h1>
                    <p class="tagline">coding interactive</p>
                </div>
            </div>

            <div class="platform-logos">
                <img src="https://www.python.org/static/community_logos/python-logo-generic.svg" alt="Python Logo"
                    class="python-logo">
                <img src="https://www.gstatic.com/mobilesdk/160503_mobilesdk/logo/2x/firebase_28dp.png"
                    alt="Firebase Logo" class="firebase-logo">
            </div>
        </div>

        <!-- Sub Header -->
        <div class="sub-header">
            <button onclick="goBack()" class="back-btn">
                <i class="fas fa-arrow-left"></i> กลับ
            </button>
            <h1 id="problemTitle"></h1>
        </div>

        <div id="problemDescription" class="problem-description"></div>

        <div class="matching-game">
            <div id="questionsContainer" class="questions-container"></div>
            <div id="canvasContainer" class="canvas-container">
                <canvas id="matchingCanvas"></canvas>
            </div>
            <div id="answersContainer" class="answers-container"></div>
        </div>

        <div class="button-group">
            <button onclick="resetMatching()" class="reset-btn">
                <i class="fas fa-undo"></i> รีเซ็ตคำตอบ
            </button>
            <button onclick="submitAnswer()" class="submit-btn">
                <i class="fas fa-paper-plane"></i> ส่งคำตอบ
            </button>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="student-matching-detail.js"></script>

    <script src="./session-timeout.js"></script>
</body>

</html>
