<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Jump - JediCode Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { 
            margin: 0; padding: 0; 
            background-color: #34495e; 
            color: white; 
            font-family: 'Sarabun', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden;
        }

        /* สไตล์สำหรับปุ่ม Fullscreen */
        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            cursor: pointer;
            z-index: 100;
            transition: background 0.3s;
        }
        .fullscreen-btn:hover { background: rgba(255,255,255,0.4); }
        
        .header { 
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: 600px; margin-bottom: 20px; 
            box-sizing: border-box; padding: 0 10px;
        }
        .score-box {
            background: #2c3e50; padding: 10px 20px; border-radius: 8px; font-size: 1.2em; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .score-val { color: #3498db; font-size: 1.5em; }
        .highscore-val { color: #f1c40f; font-size: 1.5em; }
        
        canvas { 
            background-color: #f5f6fa; 
            border: 5px solid #bdc3c7; 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            max-width: 100%;
            height: auto;
        }
        
        .btn { 
            background-color: #0984e3; color: white; border: none; 
            padding: 12px 24px; border-radius: 5px; cursor: pointer; 
            font-size: 1.1em; font-weight: bold; text-decoration: none; 
            display: inline-flex; align-items: center; gap: 8px;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn:hover { background-color: #74b9ff; transform: scale(1.05); }
        .btn-secondary { background-color: #7f8c8d; }
        .btn-secondary:hover { background-color: #95a5a6; }
        
        #gameOver { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(44, 62, 80, 0.9); 
            flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 8px; text-align: center;
        }
        #gameOver h2 { color: #e74c3c; font-size: 3em; margin: 0 0 10px 0; text-shadow: 2px 2px 0 #000; }
        #newRecordMsg { color: #f1c40f; font-weight: bold; font-size: 1.5em; display: none; animation: pulse 1s infinite; }
        
        #startScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(245, 246, 250, 0.8); border-radius: 8px;
            color: #2d3436; font-size: 1.5em; font-weight: bold;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- ปุ่ม Fullscreen -->
    <button id="fullscreenBtn" class="fullscreen-btn" title="เปิดเต็มจอ">
        <i class="fas fa-expand"></i>
    </button>

    <div class="header">
        <div class="score-box">คะแนน: <span id="score" class="score-val">0</span></div>
        <div class="score-box">สถิติสูงสุด: <span id="highScore" class="highscore-val">0</span></div>
    </div>

    <div style="position: relative;">
        <!-- Canvas กว้าง 600 สูง 200 -->
        <canvas id="gameCanvas" width="600" height="200"></canvas>
        
        <div id="startScreen">
            กด Spacebar หรือ แตะหน้าจอ เพื่อเริ่มและกระโดด
        </div>

        <div id="gameOver">
            <h2>GAME OVER</h2>
            <p style="font-size: 1.5em; margin-bottom: 5px;">คะแนนของคุณ: <span id="finalScore" style="color: #3498db; font-weight: bold;">0</span></p>
            <p id="newRecordMsg">🎉 ทำลายสถิติใหม่! 🎉</p>
            <div style="margin-top: 30px; display: flex; gap: 15px;">
                <a href="student-class-detail.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> กลับโซน Arcade</a>
            </div>
        </div>
    </div>
    
    <div style="margin-top: 20px; color: #bdc3c7; text-align: center; padding: 0 10px;">
        <p><i class="fas fa-keyboard"></i> กด <b>Spacebar</b> หรือ <b>แตะหน้าจอ/คลิกเมาส์</b> เพื่อกระโดดหลบสิ่งกีดขวาง</p>
    </div>

    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="config.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const db = firebase.firestore();
        
        let score = 0;
        let userHighScore = 0;
        let gameLoop;
        let isPlaying = false;
        let isGameOver = false;

        // ตัวละครไดโนเสาร์
        const dino = {
            x: 50,
            y: 150, // วิ่งบนพื้น
            width: 30,
            height: 40,
            dy: 0,
            gravity: 0.6,
            jumpPower: -10,
            isJumping: false
        };

        // สิ่งกีดขวาง (กระบองเพชร)
        let obstacles = [];
        let obstacleSpeed = 5;
        let frameCount = 0;
        
        // มอนสเตอร์บินได้ (แมลงวัน)
        let monsters = [];
        let isCheckingTicket = false; // ตัวแปรป้องกันการกดรัวๆ

        let scoreDocRef = null;

        // 1. โหลด Highscore
        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const urlParams = new URLSearchParams(window.location.search);
                    const classId = urlParams.get('classId');
                    
                    if (classId) {
                        const snapshot = await db.collection('class_enrollments')
                            .where('studentId', '==', user.uid)
                            .where('classId', '==', classId).get();
                        if (!snapshot.empty) {
                            scoreDocRef = snapshot.docs[0].ref;
                        }
                    }
                    if (!scoreDocRef) {
                        scoreDocRef = db.collection('users').doc(user.uid);
                    }

                    const doc = await scoreDocRef.get();
                    if (doc.exists && doc.data().arcadeHighscores && doc.data().arcadeHighscores.dino) {
                        userHighScore = doc.data().arcadeHighscores.dino;
                        document.getElementById('highScore').textContent = userHighScore;
                    }
                } catch(e) {
                    console.error("Error loading highscore:", e);
                }
            } else {
                alert("กรุณาเข้าสู่ระบบ");
                window.location.href = "login.html";
            }
        });

        // 2. ควบคุมการกระโดด
        async function jump() {
            if (isGameOver) return;
            if (!isPlaying) {
                isPlaying = true;
                document.getElementById('startScreen').style.display = 'none';
                gameLoop = requestAnimationFrame(update);
            }

            if (isPlaying && !dino.isJumping) {
                dino.dy = dino.jumpPower;
                dino.isJumping = true;
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // ป้องกันจอเลื่อน
                jump();
            }
        });
        canvas.addEventListener('mousedown', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        }, { passive: false });

        // 3. วาดกราฟิก
        function draw() {
            // ล้างหน้าจอ
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // วาดพื้น
            ctx.beginPath();
            ctx.moveTo(0, 190);
            ctx.lineTo(600, 190);
            ctx.strokeStyle = "#bdc3c7";
            ctx.lineWidth = 2;
            ctx.stroke();

            // วาดไดโนเสาร์ (สี่เหลี่ยมสีฟ้า)
            ctx.fillStyle = "#0984e3";
            ctx.fillRect(dino.x, dino.y, dino.width, dino.height);

            // วาดตาไดโนเสาร์
            ctx.fillStyle = "white";
            ctx.fillRect(dino.x + 20, dino.y + 5, 5, 5);

            // วาดสิ่งกีดขวาง (กระบองเพชรสีแดง)
            ctx.fillStyle = "#d63031";
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });

            // วาดมอนสเตอร์บินได้ (แมลงวัน)
            monsters.forEach(m => {
                // ตัวแมลงวันสีเทาดำ
                ctx.fillStyle = "#2d3436"; 
                ctx.beginPath();
                ctx.arc(m.x + m.width/2, m.y + m.height/2, m.width/2, 0, Math.PI * 2);
                ctx.fill();

                // ปีกกระพือ (สีขาวใส)
                ctx.fillStyle = "rgba(236, 240, 241, 0.8)";
                ctx.beginPath();
                ctx.ellipse(m.x + m.width/2 - 5, m.y - 2, 8, 12, Math.PI/6 * Math.sin(m.angle*15), 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(m.x + m.width/2 + 5, m.y - 2, 8, 12, -Math.PI/6 * Math.sin(m.angle*15), 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // 4. อัปเดตสถานะเกม
        function update() {
            if (isGameOver) return;

            frameCount++;

            // เพิ่มคะแนนตามระยะทางที่วิ่ง (ช้าลง 5 เท่า จากเดิมทุก 10 frame เป็นทุก 50 frame)
            if (frameCount % 50 === 0) {
                score++;
                document.getElementById('score').textContent = score;
                
                // เพิ่มความเร็วเกมทุกๆ 100 คะแนน
                if (score % 100 === 0) obstacleSpeed += 0.5;
            }

            // ระบบแรงโน้มถ่วงของไดโนเสาร์
            dino.dy += dino.gravity;
            dino.y += dino.dy;

            // ชนพื้น
            if (dino.y + dino.height > 190) {
                dino.y = 190 - dino.height;
                dino.dy = 0;
                dino.isJumping = false;
            }

            // สร้างสิ่งกีดขวางใหม่ (สุ่มระยะห่าง)
            if (frameCount % (Math.floor(Math.random() * 60) + 60) === 0) {
                obstacles.push({
                    x: canvas.width,
                    y: 190 - 40, // ความสูง 40
                    width: 20,
                    height: 40
                });
            }

            // สร้างแมลงวัน (ทุกๆ ประมาณ 30 วินาที ที่ 60fps = 1800 frame)
            if (frameCount % 1800 === 0 && frameCount > 0) {
                monsters.push({
                    x: canvas.width,
                    baseY: 60 + Math.random() * 40, // ความสูงฐานแบบสุ่ม (บนๆ)
                    y: 60,
                    width: 20,
                    height: 20,
                    angle: 0,
                    speed: obstacleSpeed + 1 // บินเร็วกว่ากระบองเพชรนิดนึง
                });
            }

            // ขยับสิ่งกีดขวาง และเช็คการชน
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.x -= obstacleSpeed;

                // ตรวจสอบการชน (Collision Detection)
                if (dino.x < obs.x + obs.width &&
                    dino.x + dino.width > obs.x &&
                    dino.y < obs.y + obs.height &&
                    dino.y + dino.height > obs.y) {
                    
                    isGameOver = true;
                    handleGameOver();
                    return; // จบเกมทันที
                }

                // ลบสิ่งกีดขวางที่หลุดจอ
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                    i--;
                }
            }

            // ขยับแมลงวัน และเช็คการชน
            for (let i = 0; i < monsters.length; i++) {
                let m = monsters[i];
                m.x -= m.speed;
                m.angle += 0.05;
                m.y = m.baseY + Math.sin(m.angle) * 30; // บินขึ้นลงแบบคลื่น (แอมพลิจูด 30)

                // ตรวจสอบการชนกับแมลงวัน (Hitbox เล็กลงนิดนึงเพื่อความแฟร์)
                if (dino.x < m.x + 15 &&
                    dino.x + dino.width > m.x + 5 &&
                    dino.y < m.y + 15 &&
                    dino.y + dino.height > m.y + 5) {
                    
                    isGameOver = true;
                    handleGameOver();
                    return; // จบเกมทันที
                }

                // ลบแมลงวันที่หลุดจอ
                if (m.x + m.width < 0) {
                    monsters.splice(i, 1);
                    i--;
                }
            }

            draw();
            gameLoop = requestAnimationFrame(update);
        }

        // วาดฉากเริ่มเกมทิ้งไว้
        draw();

        // 5. จัดการเมื่อจบเกม
        async function handleGameOver() {
            cancelAnimationFrame(gameLoop);
            document.getElementById('gameOver').style.display = 'flex';
            document.getElementById('finalScore').textContent = score;
            
            if (score > userHighScore) {
                document.getElementById('newRecordMsg').style.display = 'block';
                const user = firebase.auth().currentUser;
                if (user && scoreDocRef) {
                    try {
                        await scoreDocRef.set({
                            arcadeHighscores: { dino: score }
                        }, { merge: true });
                    } catch (e) {
                        console.error("Error saving score:", e);
                    }
                }
            }
        }

        // ระบบ Fullscreen
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable full-screen mode: ${err.message}`);
                });
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
                }
            }
        });

        // ฟังอีเวนต์การเปลี่ยนสถานะ Fullscreen (เผื่อผู้ใช้กด ESC ออก)
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        });
    </script>
</body>
</html>
