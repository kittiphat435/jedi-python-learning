<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>เครื่องมือพัฒนาเว็บ</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background-color: #f5f5f5;
    }
    .header {
      background-color: #04AA6D;
      color: white;
      padding: 10px 20px;
      text-align: center;
    }
    
    /* Python Converter Styles */
    .converter-container {
      padding: 10px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .converter-textarea {
      width: 100%;
      height: 100%;
      font-family: 'Consolas', 'Courier New', monospace;
      margin-bottom: 8px;
      resize: none;
    }
    .converter-button {
      padding: 8px 16px;
      font-size: 14px;
      margin-bottom: 10px;
      background-color: #04AA6D;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    
    /* W3Schools Simulator Styles */
    .container {
      display: flex;
      flex: 1;
      flex-wrap: wrap;
    }
    .editor-container, .result-container {
      flex: 1;
      min-width: 300px;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }
    .editor-container {
      border-right: 1px solid #ddd;
      background-color: #f9f9f9;
    }
    .result-container {
      background-color: white;
    }
    .section-title {
      margin-top: 0;
      padding: 10px;
      background-color: #e9e9e9;
      border-radius: 4px 4px 0 0;
    }
    .editor-tabs {
      display: flex;
      background-color: #f1f1f1;
      border: 1px solid #ccc;
      border-bottom: none;
      border-radius: 4px 4px 0 0;
    }
    .editor-tab {
      padding: 10px 15px;
      cursor: pointer;
      background-color: inherit;
      border: none;
      outline: none;
      transition: 0.3s;
    }
    .editor-tab:hover {
      background-color: #ddd;
    }
    .editor-tab.active {
      background-color: #04AA6D;
      color: white;
    }
    .editor-content {
      display: none;
    }
    .editor-content.active {
      display: block;
    }
    textarea {
      width: 100%;
      height: 300px;
      border: 1px solid #ddd;
      border-top: none;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      resize: none;
      padding: 10px;
      box-sizing: border-box;
    }
    #result-frame {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 0 0 4px 4px;
      min-height: 400px;
      height: 100%;
    }
    .button-container {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }
    button {
      padding: 8px 16px;
      background-color: #04AA6D;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #059862;
    }
    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 4px;
    }
    .success {
      background-color: #dff0d8;
      color: #3c763d;
    }
    .error {
      background-color: #f2dede;
      color: #a94442;
    }
    .main-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: auto;
    }
    .divider {
      height: 2px;
      background-color: #04AA6D;
      margin: 20px 0;
    }
    /* ซ่อนส่วนที่ไม่ต้องการแสดงผล */
    .hidden {
      display: none !important;
    }
    /* ปรับขนาด iframe ให้ใหญ่ขึ้น */
    .result-only {
      width: 100%;
      height: 100%;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    /* ปรับ layout เมื่อซ่อนบางส่วน */
    .simplified-layout {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
      height: calc(100% - 120px); /* ปรับความสูงให้เหมาะสม */
    }
    
    /* เพิ่ม CSS สำหรับ 2 คอลัมน์ */
    .two-column-layout {
      display: flex;
      flex-direction: row;
      gap: 20px;
      height: 100%;
    }
    
    .column {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    
    .column-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    
    .column-title {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 18px;
      color: #333;
    }
    
    .full-height {
      height: 100%;
    }
  </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="header">
    <h1>เครื่องมือพัฒนาเว็บ</h1>
    <p>เครื่องมือสำหรับการพัฒนาเว็บแอปพลิเคชัน</p>
  </div>
  
  <div class="main-container simplified-layout">
    <!-- แบ่งเป็น 2 คอลัมน์ -->
    <div class="two-column-layout">
      <!-- คอลัมน์ซ้าย: Tkinter Python Code -->
      <div class="column">
        <h3 class="column-title">Tkinter Python Code</h3>
        <div class="column-content">
          <textarea id="pythonInput" class="converter-textarea full-height" placeholder="import tkinter...\n"></textarea>
          <button id="convertBtn" class="converter-button">แปลงโค้ดและรันอัตโนมัติ</button>
        </div>
      </div>
      
      <!-- คอลัมน์ขวา: ผลลัพธ์ GUI -->
      <div class="column">
        <h3 class="column-title">ผลลัพธ์ GUI</h3>
        <div class="column-content">
          <iframe id="result-frame" class="result-only full-height" sandbox="allow-scripts" frameborder="0"></iframe>
        </div>
      </div>
    </div>
    
    <!-- ซ่อนส่วนที่ไม่ต้องการแสดงผล -->
    <textarea id="htmlOutput" class="converter-textarea hidden" placeholder="<!DOCTYPE html>..."></textarea>
    
    <!-- W3Schools Simulator (ซ่อนไว้) -->
    <div class="container hidden">
      <div class="editor-container">
        <h2 class="section-title">Code Editor</h2>
        <div class="editor-tabs">
          <button class="editor-tab active" onclick="openEditorTab('html')">HTML</button>
          <button class="editor-tab" onclick="openEditorTab('css')">CSS</button>
          <button class="editor-tab" onclick="openEditorTab('js')">JavaScript</button>
        </div>
        <div id="html-tab" class="editor-content active">
          <textarea id="html-editor" spellcheck="false">
<h1>สวัสดี W3Schools Simulator</h1>
<p>นี่คือตัวอย่างเว็บเพจอย่างง่าย</p>
<button id="myButton">คลิกที่นี่</button>
<p id="demo"></p>
          </textarea>
        </div>
        <div id="css-tab" class="editor-content">
          <textarea id="css-editor" spellcheck="false">
body {
  font-family: 'Outfit', 'Sarabun', sans-serif;
  margin: 20px;
  background-color: #f5f5f5;
}
h1 {
  color: #04AA6D;
  text-align: center;
}
p {
  font-size: 16px;
}
button {
  padding: 8px 16px;
  background-color: #04AA6D;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
button:hover {
  background-color: #059862;
}
          </textarea>
        </div>
        <div id="js-tab" class="editor-content">
          <textarea id="js-editor" spellcheck="false">
document.getElementById("myButton").addEventListener("click", function() {
  document.getElementById("demo").innerHTML = "คุณได้คลิกปุ่มแล้ว!";
});
          </textarea>
        </div>
        <div class="button-container">
          <button id="run-button">รันโค้ด</button>
          <button id="clear-button">ล้างโค้ด</button>
        </div>
        <div id="status" class="status"></div>
      </div>
      <div class="result-container hidden">
        <h2 class="section-title">ผลลัพธ์</h2>
      </div>
    </div>
  </div>

  <script>
    // ... existing code ...
    // Python GUI Converter
    document.getElementById('convertBtn').addEventListener('click', function() {
      convertCode();
      // เรียกใช้ฟังก์ชันส่งไปยัง Simulator โดยอัตโนมัติหลังจากแปลงโค้ด
      sendToSimulator(true); // ส่งพารามิเตอร์ true เพื่อให้รันโค้ดทันที
    });

    function sendToSimulator(autoRun = false) {
      const htmlOutput = document.getElementById('htmlOutput').value;
      
      if (!htmlOutput) {
        alert("กรุณาแปลงโค้ด Python เป็น HTML ก่อน");
        return;
      }
      
      // แยกส่วน HTML, CSS และ JavaScript จากโค้ด HTML ที่สร้างขึ้น
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlOutput, 'text/html');
      
      // ดึงส่วน HTML ทั้งหมด
      // ใช้ค่าจาก htmlOutput โดยตรงสำหรับแท็บ HTML
      const htmlContent = htmlOutput.trim();
      
      // ดึงส่วน CSS (ถ้ามี)
      let cssContent = "";
      const styleElements = doc.querySelectorAll('style');
      if (styleElements.length > 0) {
        styleElements.forEach(style => {
          cssContent += style.textContent;
        });
      }
      
      // ดึงส่วน JavaScript
      let jsContent = "";
      const scriptElements = doc.querySelectorAll('script');
      if (scriptElements.length > 0) {
        scriptElements.forEach(script => {
          jsContent += script.textContent;
        });
      }
      
      // ใส่โค้ดลงในแต่ละแท็บของ simulator
      document.getElementById('html-editor').value = htmlContent;
      document.getElementById('css-editor').value = cssContent;
      document.getElementById('js-editor').value = jsContent;
      
      // ค้นหาชื่อฟังก์ชันจาก JavaScript
      const funcMatch = jsContent.match(/function\s+(\w+)\s*\(\)/);
      const funcName = funcMatch ? funcMatch[1] : null;
      
      // รันโค้ดอัตโนมัติถ้า autoRun เป็น true
      if (autoRun) {
        // รันโค้ดและรอให้ iframe โหลดเสร็จก่อนเรียกใช้ฟังก์ชัน
        const resultFrame = document.getElementById('result-frame');
        
        // ล้าง iframe ก่อนเพื่อให้แน่ใจว่าจะโหลดใหม่
        resultFrame.srcdoc = '';
        
        // สร้างโค้ด HTML ที่มีการเรียกใช้ฟังก์ชันอัตโนมัติ
        const htmlCode = document.getElementById("html-editor").value;
        const cssCode = document.getElementById("css-editor").value;
        const jsCode = document.getElementById("js-editor").value;
        
        // เพิ่มการเรียกใช้ฟังก์ชันอัตโนมัติเมื่อโหลดเสร็จ
        let autoRunJs = jsCode;
        if (funcName) {
          autoRunJs = jsCode + `\n\n// เรียกใช้ฟังก์ชันอัตโนมัติ\nwindow.onload = function() {\n  if (typeof ${funcName} === 'function') {\n    ${funcName}();\n  }\n};\n`;
        }
        
        const fullCode = `
<!DOCTYPE html>
<html>
<head>
  <style>${cssCode}</style>
</head>
<body>
  ${htmlCode}
  <script>${autoRunJs.replace(/<\/script>/g, "<\\/script>")}<\/script>
</body>
</html>
        `;
        
        resultFrame.srcdoc = fullCode;
        // ไม่แสดงข้อความสถานะเนื่องจากซ่อนส่วนนั้นไว้
      } else {
        // เพียงแค่รันโค้ดตามปกติ
        runCode();
      }
    }

    function convertCode() {
      const code = document.getElementById('pythonInput').value;
      const lines = code.split('\n');

      // Metadata
      let title = 'GUI';
      let width = 300, height = 200;
      const labels = [];              // {name, text, fg, bg}
      const entries = {};             // widgetVar -> placeholder
      const checks = {};              // varName -> {on, off, label}
      const localMap = {};            // localVar -> widgetVar
      let funcName = '';
      const funcLines = [];
      let inFunc = false;

      // Pass 1: parse definitions and collect function lines
      lines.forEach(raw => {
        const line = raw.trim(); let m;
        if (m = line.match(/root\.title\(['"](.+?)['"]\)/)) {
          title = m[1];
        } else if (m = line.match(/root\.geometry\(['"](\d+)x(\d+)['"]\)/)) {
          width = +m[1]; height = +m[2];
        } else if (m = line.match(/(\w+)\s*=\s*StringVar\(value=['"](.+?)['"]\)/)) {
          entries[m[1]] = m[2];
        } else if (m = line.match(/Entry\([^)]*textvariable\s*=\s*(\w+)/)) {
          if (!(m[1] in entries)) entries[m[1]] = '';
        } else if (m = line.match(/(\w+)\s*=\s*Label\(([^)]*)\)/)) {
          const name = m[1], opts = m[2];
          const text = (opts.match(/text=['"](.+?)['"]/)||[])[1] || '';
          const fg   = (opts.match(/fg=['"](.+?)['"]/)||[])[1] || '';
          const bg   = (opts.match(/bg=['"](.+?)['"]/)||[])[1] || '';
          labels.push({ name, text, fg, bg });
        } else if (m = line.match(/(\w+)\s*=\s*IntVar/)) {
          checks[m[1]] = { on:1, off:0, label: '' };
        } else if (m = line.match(/Checkbutton\([^)]*text=['"](.+?)['"][^)]*variable\s*=\s*(\w+)[^)]*onvalue\s*=\s*(\d+)[^)]*offvalue\s*=\s*(\d+)/)) {
          checks[m[2]] = { on:+m[3], off:+m[4], label: m[1] };
        } else if (m = line.match(/def\s+(\w+)\s*\(\)\s*:/)) {
          funcName = m[1]; inFunc = true;
        } else if (inFunc) {
          // Map local assignments to entry variables
          if (m = line.match(/(\w+)\s*=\s*int\((\w+)\.get\(\)\)/)) {
            localMap[m[1]] = m[2];
          }
          if (/^\s/.test(raw)) {
            funcLines.push(line);
          } else {
            inFunc = false;
          }
        }
      });

      // Extract f-string config and branch info
      let exprConfig = null;            // {label, prefix, expr, suffix}
      const staticConfigs = [];         // [{label, text}, ...]
      let branchVar = null;
      funcLines.forEach(fl => {
        let m;
        if (m = fl.match(/(\w+)\.config\(text=f['"](.*?)\{(.+?)\}(.*?)['"]\)/)) {
          exprConfig = { label: m[1], prefix: m[2], expr: m[3].trim(), suffix: m[4] };
        } else if (m = fl.match(/(\w+)\.config\(text=f['"](.+?)['"]\)/)) {
          staticConfigs.push({ label: m[1], text: m[2] });
        } else if (m = fl.match(/if\s*\(\s*(\w+)\.get\(\)/)) {
          branchVar = m[1];
        }
      });

      // Build HTML widgets
      const html = [];
      labels.forEach(l => {
        let style = '';
        if (l.fg) style += `color:${l.fg};`;
        if (l.bg) style += `background-color:${l.bg};`;
        html.push(`<div id="label_${l.name}" style="${style}">${l.text}</div>`);
      });
      Object.entries(entries).forEach(([w, ph]) => {
        const placeholder = ph ? ` placeholder=\"${ph}\"` : '';
        html.push(`<input type=\"text\" id=\"entry_${w}\"${placeholder}/> `);
      });
      Object.entries(checks).forEach(([v, o]) => {
        html.push(`<label><input type=\"checkbox\" id=\"cb_${v}\"/>${o.label}</label>`);
      });
      html.push(`<button onclick=\"${funcName}()\">${funcName}</button>`);

      // Build JS function preserving local variable names
      let js = `function ${funcName}() {\n`;
      // 1. Declare local variables from localMap
      Object.entries(localMap).forEach(([local, w]) => {
        js += `  const ${local} = parseInt(document.getElementById(\"entry_${w}\").value, 10);\n`;
      });
      // 2. Declare isChecked if needed
      if (branchVar) {
        js += `  const isChecked = document.getElementById(\"cb_${branchVar}\").checked;\n\n`;
      }
      // 3. Validation on first two locals (order preserved)
      const locals = Object.keys(localMap);
      if (locals.length >= 2) {
        js += `  if (isNaN(${locals[0]}) || isNaN(${locals[1]})) {\n`;
        js += `    alert(\"กรุณากรอกข้อมูลให้ถูกต้อง\");\n`;
        js += `    return;\n  }\n\n`;
      }
      // 4. f-string config
      if (exprConfig) {
        js += "  document.getElementById(\"label_" + exprConfig.label + "\").textContent = `"
               + exprConfig.prefix + "${" + exprConfig.expr + "}" + exprConfig.suffix + "`;" + "\n\n";
      }
      // 5. Branch updates
      if (branchVar && staticConfigs.length >= 2) {
        js += `  if (isChecked) {\n`;
        js += `    document.getElementById(\"label_${staticConfigs[0].label}\").textContent = \"${staticConfigs[0].text}\";\n`;
        js += `  } else {\n`;
        js += `    document.getElementById(\"label_${staticConfigs[1].label}\").textContent = \"${staticConfigs[1].text}\";\n`;
        js += `  }\n`;
      }
      js += `}\n`;

      // Assemble final HTML
      const output =
`<!DOCTYPE html>\n<html>\n<head>\n  <meta charset=\"UTF-8\">\n  <title>${title}</title>\n</head>\n<body style=\"width:${width}px;height:${height}px;display:flex;flex-direction:column;gap:8px;\">\n${html.join('\n')}\n<script>\n${js}\n<\/script>\n</body>\n</html>`;

      document.getElementById('htmlOutput').value = output;
    }
    
    // W3Schools Simulator
    function openEditorTab(tabName) {
      const tabContents = document.getElementsByClassName("editor-content");
      for (let content of tabContents) content.classList.remove("active");

      const tabs = document.getElementsByClassName("editor-tab");
      for (let tab of tabs) tab.classList.remove("active");

      document.getElementById(tabName + "-tab").classList.add("active");
      document.querySelector(`.editor-tab[onclick="openEditorTab('${tabName}')"]`).classList.add("active");
    }

    function showStatus(message, isError = false) {
      const status = document.getElementById("status");
      status.textContent = message;
      status.className = isError ? "status error" : "status success";
      setTimeout(() => {
        status.textContent = "";
        status.className = "status";
      }, 3000);
    }

    function runCode() {
      try {
        const htmlCode = document.getElementById("html-editor").value;
        const cssCode = document.getElementById("css-editor").value;
        const jsCode = document.getElementById("js-editor").value;

        const fullCode = `
<!DOCTYPE html>
<html>
<head>
  <style>${cssCode}</style>
</head>
<body>
  ${htmlCode}
  <script>${jsCode.replace(/<\/script>/g, "<\\/script>")}<\/script>
</body>
</html>
        `;

        const resultFrame = document.getElementById("result-frame");
        resultFrame.srcdoc = fullCode;
      } catch (error) {
        console.error("เกิดข้อผิดพลาด: " + error.message);
      }
    }

    function clearCode() {
      if (confirm("คุณแน่ใจหรือไม่ที่จะล้างโค้ดทั้งหมด?")) {
        document.getElementById("html-editor").value =
`<h1>สวัสดี W3Schools Simulator</h1>
<p>นี่คือตัวอย่างเว็บเพจอย่างง่าย</p>
<button id="myButton">คลิกที่นี่</button>
<p id="demo"></p>`;
        document.getElementById("css-editor").value =
`body {
  font-family: 'Outfit', 'Sarabun', sans-serif;
  margin: 20px;
}
h1 {
  color: blue;
}`;
        document.getElementById("js-editor").value =
`document.getElementById("myButton").addEventListener("click", function () {
  document.getElementById("demo").innerHTML = "คุณได้คลิกปุ่มแล้ว!";
});`;
        runCode();
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("run-button").addEventListener("click", runCode);
      document.getElementById("clear-button").addEventListener("click", clearCode);
      runCode();
    });
  </script>
</body>
</html>
