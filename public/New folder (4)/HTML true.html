<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>เห้ยๆ ฮี่ๆ</title>
  <style>
    .window {
      border:2px solid #444;
      border-radius:6px;
      width:550px;
      height:400px;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      box-shadow:2px 2px 6px rgba(0,0,0,0.3);
    }
    .title-bar {
      background:#eee;
      padding:6px;
      text-align:center;
      font-weight:bold;
      border-bottom:1px solid #444;
      user-select:none;
    }
    .content {
      flex:1;
      padding:8px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .content > * {
      display:block;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="title-bar">เห้ยๆ ฮี่ๆ</div>
    <div class="content">
      <div id="label_B" style="color:#FFFFCC;background-color:blue;">5555555555</div>
      <div id="label_A" style="color:#FFFFCC;background-color:blue;">4444444444</div>
      <div id="label_C" style="color:#FFFFCC;background-color:blue;">3333333</div>
      <div id="label_D" style="color:#FFFFCC;background-color:blue;">6666666666</div>
      <input type="text" id="entry_number1" placeholder="กรอกตัวเลข1"/>
      <input type="text" id="entry_number2" placeholder="กรอกตัวเลข"/>
      <label><input type="checkbox" id="cb_var1"/>Man</label>
      <button onclick="cal()">cal</button>
    </div>
  </div>
  <script>
  function cal() {
    // อ่านค่าและตรวจสอบ
    const yearborn = parseInt(document.getElementById("entry_number1").value, 10);
    const yearnow  = parseInt(document.getElementById("entry_number2").value, 10);
    if (isNaN(yearborn) || isNaN(yearnow)) {
      alert("กรุณากรอกข้อมูลให้ถูกต้อง");
      return;
    }
    
    // คำนวณอายุแล้วอัปเดต Label C
    document.getElementById("label_C").textContent = `ผลลัพธ์คำนวณอายุ = ${yearnow - yearborn}`;
    
    // ตรวจสถานะ checkbox
    const checkbox = document.getElementById("cb_var1");
    const isChecked = checkbox.checked;
    const value = isChecked ? 8 : 0;
    
    // อัปเดต Label D ตามเงื่อนไข
    if (value == 8 && (yearnow - yearborn) < 30) { 
      document.getElementById("label_D").textContent = "AA";
    } else if (value == 8 && (yearnow - yearborn) >= 30) { 
      document.getElementById("label_D").textContent = "BB";
    } else if (value == 0) { 
      document.getElementById("label_D").textContent = "CC";
    }
  }
  </script>
</body>
</html>
