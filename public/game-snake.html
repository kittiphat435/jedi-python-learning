<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Snake - JediCode Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --retro-bg: #0d0d1a;
            --retro-panel: #1a1a2e;
            --retro-green: #39ff14;
            --retro-green-dark: #1fa60c;
            --retro-cyan: #00e5ff;
            --retro-magenta: #ff2fd6;
            --retro-yellow: #ffd400;
            --retro-red: #ff3b3b;
            --retro-purple: #b23bff;
            --pixel-font: 'Press Start 2P', 'Sarabun', sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background-color: var(--retro-bg);
            background-image:
                radial-gradient(circle at 20% 20%, rgba(0,229,255,0.08), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255,47,214,0.08), transparent 40%);
            color: white;
            font-family: 'Sarabun', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        .fullscreen-btn, .sound-btn, .leaderboard-btn {
            position: absolute;
            top: 20px;
            background: var(--retro-panel);
            color: var(--retro-cyan);
            border: 2px solid var(--retro-cyan);
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 3px 3px 0 rgba(0,229,255,0.35);
        }
        .fullscreen-btn:hover, .sound-btn:hover, .leaderboard-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0 rgba(0,229,255,0.5);
        }
        .fullscreen-btn { right: 20px; }
        .sound-btn { right: 72px; }
        .leaderboard-btn {
            right: 124px;
            border-color: var(--retro-yellow);
            color: var(--retro-yellow);
            box-shadow: 3px 3px 0 rgba(255,212,0,0.35);
        }
        .leaderboard-btn:hover { box-shadow: 4px 4px 0 rgba(255,212,0,0.5); }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: 400px; margin-bottom: 16px;
            box-sizing: border-box; padding: 0 10px;
            gap: 10px;
        }
        .score-box {
            background: var(--retro-panel);
            border: 2px solid var(--retro-green-dark);
            padding: 10px 14px;
            font-family: var(--pixel-font);
            font-size: 0.6em;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
            flex: 1;
            text-align: center;
        }
        .score-val { color: var(--retro-green); font-size: 1.6em; display: block; margin-top: 6px; text-shadow: 0 0 8px rgba(57,255,20,0.7); }
        .highscore-val { color: var(--retro-yellow); font-size: 1.6em; display: block; margin-top: 6px; text-shadow: 0 0 8px rgba(255,212,0,0.7); }

        .status-bar {
            width: 100%; max-width: 400px; min-height: 22px;
            display: flex; gap: 8px; margin-bottom: 8px; padding: 0 10px;
            font-family: var(--pixel-font); font-size: 0.5em;
        }
        .status-chip {
            padding: 4px 8px; border-radius: 3px; display: none;
            align-items: center; gap: 4px;
        }
        .status-chip.active { display: flex; }
        .status-chip.chip-star { background: rgba(255,212,0,0.2); color: var(--retro-yellow); border: 1px solid var(--retro-yellow); }
        .status-chip.chip-shield { background: rgba(0,229,255,0.2); color: var(--retro-cyan); border: 1px solid var(--retro-cyan); }
        .status-chip.chip-slow { background: rgba(178,59,255,0.2); color: var(--retro-purple); border: 1px solid var(--retro-purple); }

        .game-frame {
            position: relative;
            width: 100%; max-width: 400px;
            border: 6px solid #33334d;
            box-shadow:
                0 0 0 3px #0d0d1a,
                0 0 0 6px var(--retro-cyan),
                0 15px 40px rgba(0,0,0,0.6);
        }

        canvas {
            background-color: #060614;
            display: block;
            width: 100%;
            height: auto;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* CRT Scanline overlay */
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                rgba(0,0,0,0) 0px,
                rgba(0,0,0,0) 1px,
                rgba(0,0,0,0.18) 2px,
                rgba(0,0,0,0.18) 3px
            );
            mix-blend-mode: multiply;
        }
        .crt-flicker {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: rgba(57,255,20,0.02);
            animation: flicker 4s infinite;
        }
        @keyframes flicker {
            0%, 96%, 100% { opacity: 1; }
            97% { opacity: 0.85; }
            98% { opacity: 1; }
        }

        .btn {
            background-color: var(--retro-magenta); color: white; border: none;
            padding: 12px 22px; cursor: pointer;
            font-family: var(--pixel-font);
            font-size: 0.6em;
            display: inline-flex; align-items: center; gap: 8px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 rgba(0,0,0,0.5); }
        .btn:active { transform: translate(0,0); box-shadow: 2px 2px 0 rgba(0,0,0,0.5); }
        .btn-secondary { background-color: #33334d; }

        #gameOver {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 6, 20, 0.92);
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; z-index: 6;
        }
        #gameOver h2 {
            color: var(--retro-red); font-family: var(--pixel-font);
            font-size: 1.6em; margin: 0 0 18px 0;
            text-shadow: 0 0 10px rgba(255,59,59,0.8), 3px 3px 0 #000;
            animation: pulse 1.2s infinite;
        }
        #finalScore { color: var(--retro-green); }
        #newRecordMsg {
            color: var(--retro-yellow); font-weight: bold; font-family: var(--pixel-font);
            font-size: 0.7em; display: none; animation: pulse 1s infinite;
            text-shadow: 0 0 8px rgba(255,212,0,0.8);
        }

        #startScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(6, 6, 20, 0.75);
            color: var(--retro-green); font-family: var(--pixel-font); font-size: 0.75em; font-weight: bold; cursor: pointer;
            z-index: 5; text-align: center; flex-direction: column; line-height: 1.8;
            text-shadow: 0 0 8px rgba(57,255,20,0.7);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 60px);
            grid-gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }
        .control-btn {
            background: var(--retro-panel); color: var(--retro-cyan); border: 2px solid var(--retro-cyan);
            height: 60px; font-size: 24px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; touch-action: manipulation;
            box-shadow: 3px 3px 0 rgba(0,229,255,0.3);
        }
        .control-btn:active { background: #2c3e50; transform: translate(1px, 1px); box-shadow: none; }

        .keyboard-hint { font-family: 'Sarabun', sans-serif; }

        @media (max-width: 600px) {
            .mobile-controls { display: grid; }
            .keyboard-hint { display: none; }
        }

        /* Leaderboard Modal */
        .modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 200;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: var(--retro-panel);
            border: 3px solid var(--retro-yellow);
            box-shadow: 6px 6px 0 rgba(0,0,0,0.6);
            width: 92%; max-width: 380px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-box h3 {
            font-family: var(--pixel-font);
            color: var(--retro-yellow);
            font-size: 0.85em;
            text-align: center;
            margin: 0 0 16px 0;
            text-shadow: 0 0 8px rgba(255,212,0,0.6);
        }
        .modal-close {
            display: block; margin: 16px auto 0;
            background: #33334d; color: white; border: none;
            padding: 10px 20px; cursor: pointer;
            font-family: var(--pixel-font); font-size: 0.55em;
        }
        .lb-row {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 6px; font-size: 0.85em;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .lb-row.me { background: rgba(0,229,255,0.12); border-radius: 4px; }
        .lb-rank { width: 26px; font-family: var(--pixel-font); font-size: 0.7em; color: var(--retro-cyan); }
        .lb-rank.top1 { color: var(--retro-yellow); }
        .lb-rank.top2 { color: #d0d0e0; }
        .lb-rank.top3 { color: #cd7f32; }
        .lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .lb-score { font-family: var(--pixel-font); font-size: 0.7em; color: var(--retro-green); }
        .lb-empty { text-align: center; padding: 20px 0; opacity: 0.7; }
        .lb-loading { text-align: center; padding: 20px 0; opacity: 0.7; }
    </style>
</head>
<body>

    <!-- ปุ่ม Leaderboard / เสียง / Fullscreen -->
    <button id="leaderboardBtn" class="leaderboard-btn" title="อันดับในห้องเรียน">
        <i class="fas fa-trophy"></i>
    </button>
    <button id="soundBtn" class="sound-btn" title="เปิด/ปิดเสียง">
        <i class="fas fa-volume-up"></i>
    </button>
    <button id="fullscreenBtn" class="fullscreen-btn" title="เปิดเต็มจอ">
        <i class="fas fa-expand"></i>
    </button>

    <div class="header">
        <div class="score-box">คะแนน<span id="score" class="score-val">0</span></div>
        <div class="score-box">สถิติสูงสุด<span id="highScore" class="highscore-val">0</span></div>
    </div>

    <div class="status-bar" id="statusBar">
        <span class="status-chip chip-star" id="chipStar"><i class="fas fa-star"></i> x2</span>
        <span class="status-chip chip-shield" id="chipShield"><i class="fas fa-shield-halved"></i></span>
        <span class="status-chip chip-slow" id="chipSlow"><i class="fas fa-hourglass-half"></i></span>
    </div>

    <div class="game-frame">
        <!-- Canvas 400x400 (20x20 Grid) -->
        <canvas id="gameCanvas" width="400" height="400" style="width: 100%; display: block;"></canvas>
        <div class="scanlines"></div>
        <div class="crt-flicker"></div>

        <div id="startScreen">
            <i class="fas fa-play-circle" style="font-size: 2.4em; color: var(--retro-green); margin-bottom: 14px;"></i>
            กดปุ่มทิศทาง<br>เพื่อเริ่มเกม
        </div>

        <div id="gameOver">
            <h2>GAME OVER</h2>
            <p style="font-size: 1.1em; margin-bottom: 5px;">คะแนนของคุณ<br><span id="finalScore" style="font-family: var(--pixel-font); font-size: 1.4em; font-weight: bold;">0</span></p>
            <p id="newRecordMsg">🎉 ทำลายสถิติใหม่! 🎉</p>
            <div style="margin-top: 20px; display: flex; gap: 15px;">
                <a href="student-class-detail.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> กลับโซน Arcade</a>
            </div>
        </div>
    </div>

    <div style="margin-top: 20px; color: #8888aa; text-align: center;" class="keyboard-hint">
        <p><i class="fas fa-keyboard"></i> ใช้ปุ่มลูกศร (⬆️ ⬇️ ⬅️ ➡️) ในการบังคับงู</p>
        <p style="font-size: 0.85em;">⭐ ดาว = คะแนน x2 &nbsp; 🛡️ โล่ = กันชนตาย 1 ครั้ง &nbsp; ⏳ นาฬิกาทราย = ชะลอเกม</p>
    </div>

    <!-- Mobile D-pad -->
    <div class="mobile-controls">
        <div></div>
        <button class="control-btn" id="btn-up"><i class="fas fa-arrow-up"></i></button>
        <div></div>
        <button class="control-btn" id="btn-left"><i class="fas fa-arrow-left"></i></button>
        <button class="control-btn" id="btn-down"><i class="fas fa-arrow-down"></i></button>
        <button class="control-btn" id="btn-right"><i class="fas fa-arrow-right"></i></button>
    </div>

    <!-- Leaderboard Modal -->
    <div class="modal-overlay" id="leaderboardModal">
        <div class="modal-box">
            <h3><i class="fas fa-trophy"></i> อันดับในห้องเรียน</h3>
            <div id="leaderboardContent" class="lb-loading">กำลังโหลด...</div>
            <button class="modal-close" id="closeLeaderboardBtn">ปิด</button>
        </div>
    </div>

    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="config.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        const box = 20; // ขนาดของตาราง 1 ช่อง
        const GRID = 20; // 20x20 ช่อง

        let score = 0;
        let snake = [];
        snake[0] = { x: 9 * box, y: 10 * box }; // จุดเริ่มต้นงู

        // สุ่มตำแหน่งอาหาร
        let food = randomCell();

        // อาร์เรย์เก็บระเบิด
        let bombs = [];

        // Power-up ที่กำลังอยู่บนกระดาน (มีได้ทีละ 1 อัน) : { x, y, type, spawnedAt }
        let powerup = null;
        const POWERUP_TYPES = ['star', 'shield', 'slow'];
        const POWERUP_LIFETIME_MS = 7000;

        // สถานะเอฟเฟกต์ที่กำลัง active
        let scoreMultiplier = 1;
        let multiplierEndAt = 0;
        let shieldActive = false;
        let slowActive = false;
        let slowEndAt = 0;

        const BASE_SPEED = 120;
        const SLOW_SPEED = 210;
        let currentSpeed = BASE_SPEED;

        let d; // ทิศทาง
        let game;
        let isPlaying = false;
        let userHighScore = 0;
        const db = firebase.firestore();

        let scoreDocRef = null;
        let currentClassId = null;

        function randomCell() {
            return {
                x: Math.floor(Math.random() * GRID) * box,
                y: Math.floor(Math.random() * GRID) * box
            };
        }

        function cellFree(cell) {
            if (food && cell.x === food.x && cell.y === food.y) return false;
            if (powerup && cell.x === powerup.x && cell.y === powerup.y) return false;
            for (let i = 0; i < snake.length; i++) {
                if (cell.x === snake[i].x && cell.y === snake[i].y) return false;
            }
            for (let i = 0; i < bombs.length; i++) {
                if (cell.x === bombs[i].x && cell.y === bombs[i].y) return false;
            }
            return true;
        }

        function randomFreeCell() {
            let cell;
            let attempts = 0;
            do {
                cell = randomCell();
                attempts++;
            } while (!cellFree(cell) && attempts < 200);
            return cell;
        }

        // ==========================================
        // 🔊 เสียงประกอบสไตล์ 8-bit (สร้างด้วย Web Audio API ไม่ต้องใช้ไฟล์เสียงภายนอก)
        // ==========================================
        let audioCtx = null;
        let soundOn = (localStorage.getItem('snakeSoundOn') !== 'false');

        function getAudioCtx() {
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    return null;
                }
            }
            return audioCtx;
        }

        function beep(freq, durationMs, type = 'square', startDelayMs = 0, volume = 0.15) {
            if (!soundOn) return;
            const ctxA = getAudioCtx();
            if (!ctxA) return;
            const osc = ctxA.createOscillator();
            const gain = ctxA.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.value = volume;
            osc.connect(gain);
            gain.connect(ctxA.destination);
            const startTime = ctxA.currentTime + startDelayMs / 1000;
            osc.start(startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, startTime + durationMs / 1000);
            osc.stop(startTime + durationMs / 1000 + 0.02);
        }

        function playEatSound() { beep(880, 80, 'square'); beep(1180, 90, 'square', 60); }
        function playPowerupSound() { beep(660, 70, 'triangle'); beep(880, 70, 'triangle', 70); beep(1320, 120, 'triangle', 140); }
        function playHitSound() { beep(220, 150, 'sawtooth', 0, 0.12); }
        function playGameOverSound() {
            beep(392, 140, 'square', 0);
            beep(330, 140, 'square', 140);
            beep(262, 260, 'square', 280);
        }

        const soundBtn = document.getElementById('soundBtn');
        function updateSoundBtnIcon() {
            soundBtn.innerHTML = soundOn ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute"></i>';
        }
        updateSoundBtnIcon();
        soundBtn.addEventListener('click', () => {
            soundOn = !soundOn;
            localStorage.setItem('snakeSoundOn', soundOn ? 'true' : 'false');
            updateSoundBtnIcon();
            if (soundOn) { getAudioCtx(); beep(660, 60, 'square'); }
        });

        // 1. ตรวจสอบผู้ใช้และเริ่มเกม
        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                draw(); // วาดภาพเริ่มต้น
                // โหลด Highscore ของเกมงูจาก Firebase
                try {
                    const urlParams = new URLSearchParams(window.location.search);
                    const classId = urlParams.get('classId');
                    currentClassId = classId;

                    if (classId) {
                        const snapshot = await db.collection('class_enrollments')
                            .where('studentId', '==', user.uid)
                            .where('classId', '==', classId).get();
                        if (!snapshot.empty) {
                            scoreDocRef = snapshot.docs[0].ref;
                        }
                    }
                    if (!scoreDocRef) {
                        scoreDocRef = db.collection('users').doc(user.uid);
                    }

                    const doc = await scoreDocRef.get();
                    if (doc.exists && doc.data().arcadeHighscores && doc.data().arcadeHighscores.snake) {
                        userHighScore = doc.data().arcadeHighscores.snake;
                        document.getElementById('highScore').textContent = userHighScore;
                    }
                } catch(e) {
                    console.error("Error loading highscore:", e);
                }

                // รอให้ผู้ใช้กดปุ่มเพื่อเริ่มเดิน
                window.addEventListener('keydown', direction);
            } else {
                alert("กรุณาเข้าสู่ระบบ");
                window.location.href = "login.html";
            }
        });

        // 2. ควบคุมทิศทาง
        async function setDirection(newD) {
            if (!isPlaying) {
                isPlaying = true;
                document.getElementById('startScreen').style.display = 'none';
                game = setInterval(gameLoop, currentSpeed); // เริ่มเกม loop
            }
            if(isPlaying) {
                if(newD == "LEFT" && d != "RIGHT") d = "LEFT";
                if(newD == "UP" && d != "DOWN") d = "UP";
                if(newD == "RIGHT" && d != "LEFT") d = "RIGHT";
                if(newD == "DOWN" && d != "UP") d = "DOWN";
            }
        }

        function direction(event) {
            if (event.keyCode == 37) setDirection("LEFT");
            else if (event.keyCode == 38) setDirection("UP");
            else if (event.keyCode == 39) setDirection("RIGHT");
            else if (event.keyCode == 40) setDirection("DOWN");

            // ป้องกันหน้าจอเลื่อนเวลาเล่น
            if([37, 38, 39, 40].includes(event.keyCode)) {
                event.preventDefault();
            }
        }

        // Event listeners สำหรับปุ่มบนมือถือ
        document.getElementById('btn-up').addEventListener('touchstart', (e) => { e.preventDefault(); setDirection("UP"); }, {passive: false});
        document.getElementById('btn-down').addEventListener('touchstart', (e) => { e.preventDefault(); setDirection("DOWN"); }, {passive: false});
        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); setDirection("LEFT"); }, {passive: false});
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); setDirection("RIGHT"); }, {passive: false});

        // รองรับการคลิกเมาส์ด้วยบน PC
        document.getElementById('btn-up').addEventListener('mousedown', (e) => { e.preventDefault(); setDirection("UP"); });
        document.getElementById('btn-down').addEventListener('mousedown', (e) => { e.preventDefault(); setDirection("DOWN"); });
        document.getElementById('btn-left').addEventListener('mousedown', (e) => { e.preventDefault(); setDirection("LEFT"); });
        document.getElementById('btn-right').addEventListener('mousedown', (e) => { e.preventDefault(); setDirection("RIGHT"); });

        document.getElementById('startScreen').addEventListener('click', () => {
            setDirection("RIGHT"); // เริ่มวิ่งไปทางขวาเมื่อกดปุ่มเริ่ม
        });

        // ==========================================
        // 🎨 วาดกราฟิกสไตล์ Pixel Art
        // ==========================================
        function drawPixelRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
        }

        function draw() {
            // เคลียร์หน้าจอ (พื้นหลังลายตารางจางๆ)
            ctx.fillStyle = "#060614";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(57,255,20,0.05)";
            for (let i = 0; i <= GRID; i++) {
                ctx.beginPath();
                ctx.moveTo(i * box, 0);
                ctx.lineTo(i * box, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * box);
                ctx.lineTo(canvas.width, i * box);
                ctx.stroke();
            }

            // วาดงู สไตล์ pixel-block มีขอบดำหนา + ลายเกล็ด
            for (let i = 0; i < snake.length; i++) {
                const isHead = (i === 0);
                const outline = "#04210a";
                const bodyColor = isHead ? "#7dff5c" : (i % 2 === 0 ? "#39ff14" : "#2fd60f");
                drawPixelRect(snake[i].x, snake[i].y, box, box, outline);
                drawPixelRect(snake[i].x + 2, snake[i].y + 2, box - 4, box - 4, bodyColor);

                if (isHead) {
                    // ตา
                    ctx.fillStyle = "#04210a";
                    const eyeSize = 3;
                    if (d === "LEFT") {
                        ctx.fillRect(snake[i].x + 4, snake[i].y + 4, eyeSize, eyeSize);
                        ctx.fillRect(snake[i].x + 4, snake[i].y + box - 7, eyeSize, eyeSize);
                    } else if (d === "UP") {
                        ctx.fillRect(snake[i].x + 4, snake[i].y + 4, eyeSize, eyeSize);
                        ctx.fillRect(snake[i].x + box - 7, snake[i].y + 4, eyeSize, eyeSize);
                    } else if (d === "DOWN") {
                        ctx.fillRect(snake[i].x + 4, snake[i].y + box - 7, eyeSize, eyeSize);
                        ctx.fillRect(snake[i].x + box - 7, snake[i].y + box - 7, eyeSize, eyeSize);
                    } else {
                        ctx.fillRect(snake[i].x + box - 7, snake[i].y + 4, eyeSize, eyeSize);
                        ctx.fillRect(snake[i].x + box - 7, snake[i].y + box - 7, eyeSize, eyeSize);
                    }
                }
            }

            // วาดโล่รอบตัวงูถ้ามี shield active
            if (shieldActive && snake[0]) {
                ctx.strokeStyle = "#00e5ff";
                ctx.lineWidth = 2;
                ctx.strokeRect(snake[0].x - 2, snake[0].y - 2, box + 4, box + 4);
            }

            // วาดอาหาร (พิกเซลแอปเปิ้ล)
            drawApple(food.x, food.y);

            // วาดระเบิด
            for (let i = 0; i < bombs.length; i++) {
                drawBomb(bombs[i].x, bombs[i].y);
            }

            // วาด power-up
            if (powerup) {
                drawPowerup(powerup);
            }
        }

        function drawApple(x, y) {
            drawPixelRect(x + 5, y + 2, 4, 3, "#2fd60f"); // ใบ
            drawPixelRect(x + 3, y + 6, box - 6, box - 8, "#ff3b3b"); // ตัวแอปเปิ้ล
            drawPixelRect(x + 4, y + 6, 3, 3, "#ff8a8a"); // ไฮไลต์
        }

        function drawBomb(x, y) {
            // วงแหวนแดงเรืองแสงรอบตัว ช่วยให้ตัดกับพื้นหลังสีเข้ม มองเห็นชัดขึ้น
            ctx.strokeStyle = "rgba(255,59,59,0.6)";
            ctx.lineWidth = 2;
            ctx.strokeRect(x + 1, y + 1, box - 2, box - 2);

            drawPixelRect(x + 3, y + 5, box - 6, box - 7, "#52526e"); // ตัวระเบิดสีเทาอมม่วงสว่างขึ้น ตัดกับพื้นหลัง
            drawPixelRect(x + 4, y + 6, box - 8, 3, "#8484aa"); // ไฮไลต์ด้านบนเพิ่มมิติ
            drawPixelRect(x + 5, y + 3, 3, 3, "#ff3b3b"); // ชนวน
            // ประกายไฟกระพริบ
            if (Math.floor(Date.now() / 200) % 2 === 0) {
                drawPixelRect(x + 8, y + 1, 2, 2, "#ffd400");
            }
        }

        const POWERUP_STYLES = {
            star:   { color: "#ffd400", icon: "star" },
            shield: { color: "#00e5ff", icon: "shield" },
            slow:   { color: "#b23bff", icon: "slow" }
        };

        function drawPowerup(p) {
            const style = POWERUP_STYLES[p.type];
            const age = Date.now() - p.spawnedAt;
            const remaining = POWERUP_LIFETIME_MS - age;
            const blinking = remaining < 2000 && Math.floor(Date.now() / 150) % 2 === 0;
            if (blinking) return; // กระพริบตอนใกล้หมดเวลา

            drawPixelRect(p.x + 1, p.y + 1, box - 2, box - 2, "#0d0d1a");
            drawPixelRect(p.x + 3, p.y + 3, box - 6, box - 6, style.color);

            ctx.fillStyle = "#0d0d1a";
            if (style.icon === "star") {
                // ดาวจิ๋วแบบพิกเซล
                drawPixelRect(p.x + 9, p.y + 5, 2, 2, "#0d0d1a");
                drawPixelRect(p.x + 6, p.y + 9, 8, 2, "#0d0d1a");
                drawPixelRect(p.x + 8, p.y + 12, 2, 2, "#0d0d1a");
            } else if (style.icon === "shield") {
                drawPixelRect(p.x + 8, p.y + 6, 4, 6, "#0d0d1a");
            } else {
                drawPixelRect(p.x + 6, p.y + 5, 8, 2, "#0d0d1a");
                drawPixelRect(p.x + 9, p.y + 7, 2, 5, "#0d0d1a");
                drawPixelRect(p.x + 6, p.y + 13, 8, 2, "#0d0d1a");
            }
        }

        function spawnBomb() {
            const cell = randomFreeCell();
            bombs.push(cell);
        }

        function maybeSpawnPowerup() {
            if (powerup) return; // มีอยู่แล้วรอเก็บก่อน
            if (Math.random() > 0.35) return; // สุ่มโอกาสเกิด
            const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
            const cell = randomFreeCell();
            powerup = { x: cell.x, y: cell.y, type, spawnedAt: Date.now() };
        }

        function updateStatusChips() {
            const now = Date.now();
            const chipStar = document.getElementById('chipStar');
            const chipShield = document.getElementById('chipShield');
            const chipSlow = document.getElementById('chipSlow');
            chipStar.classList.toggle('active', now < multiplierEndAt);
            chipShield.classList.toggle('active', shieldActive);
            chipSlow.classList.toggle('active', now < slowEndAt);
        }

        function applyPowerup(type) {
            playPowerupSound();
            const now = Date.now();
            if (type === 'star') {
                scoreMultiplier = 2;
                multiplierEndAt = now + 8000;
            } else if (type === 'shield') {
                shieldActive = true;
            } else if (type === 'slow') {
                slowActive = true;
                slowEndAt = now + 8000;
                currentSpeed = SLOW_SPEED;
                restartGameLoopTimer();
            }
            updateStatusChips();
        }

        function restartGameLoopTimer() {
            if (!isPlaying) return;
            clearInterval(game);
            game = setInterval(gameLoop, currentSpeed);
        }

        function checkEffectExpiry() {
            const now = Date.now();
            if (scoreMultiplier > 1 && now >= multiplierEndAt) {
                scoreMultiplier = 1;
            }
            if (slowActive && now >= slowEndAt) {
                slowActive = false;
                currentSpeed = BASE_SPEED;
                restartGameLoopTimer();
            }
            // power-up หมดอายุบนกระดาน (ไม่ถูกเก็บทัน)
            if (powerup && (now - powerup.spawnedAt) > POWERUP_LIFETIME_MS) {
                powerup = null;
            }
            updateStatusChips();
        }

        function gameLoop() {
            checkEffectExpiry();
            draw();

            // คำนวณตำแหน่งหัวงูใหม่
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            // ตรวจสอบการกินอาหาร
            let poppedTail = null;
            if (snakeX == food.x && snakeY == food.y) {
                score += 10 * scoreMultiplier;
                document.getElementById('score').textContent = score;
                playEatSound();
                // สุ่มอาหารใหม่
                food = randomFreeCell();

                // เพิ่มระเบิดใหม่ 1 ลูก ทุกๆ 30 คะแนน (กินอาหาร 3 ตัว)
                if (score % 30 === 0) {
                    spawnBomb();
                }
                maybeSpawnPowerup();
                // ไม่ต้อง pop หางทิ้ง ทำให้งูยาวขึ้น
            } else {
                // ลบหางออก (งูเดินไปข้างหน้า) เก็บไว้เผื่อโล่ช่วยไว้ต้องคืนกลับ
                poppedTail = snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            // ตรวจสอบการเก็บ power-up
            if (powerup && snakeX === powerup.x && snakeY === powerup.y) {
                applyPowerup(powerup.type);
                powerup = null;
            }

            // ตรวจสอบ Game Over (ชนกำแพง, ชนตัวเอง หรือ ชนระเบิด)
            let hitBomb = false;
            for (let i = 0; i < bombs.length; i++) {
                if (snakeX === bombs[i].x && snakeY === bombs[i].y) {
                    hitBomb = true;
                    break;
                }
            }

            const isFatal = snakeX < 0 || snakeY < 0 || snakeX >= canvas.width || snakeY >= canvas.height || collision(newHead, snake) || hitBomb;

            if (isFatal) {
                if (shieldActive) {
                    // โล่ช่วยไว้ 1 ครั้ง: ยกเลิกการชน ไม่ขยับเข้าไปในช่องที่ตาย
                    // คืนหางที่เพิ่งตัดออกไปกลับเข้าไป เพื่อให้ความยาวงูเท่าเดิม (ไม่งั้นถ้างูสั้นแค่
                    // ท่อนเดียวตอนโดนช่วย snake จะกลายเป็น array ว่างแล้วเฟรมถัดไป error ทันที)
                    if (poppedTail) snake.push(poppedTail);
                    shieldActive = false;
                    playHitSound();
                    updateStatusChips();
                    return;
                }
                clearInterval(game);
                handleGameOver();
                return;
            }

            // เพิ่มหัวใหม่เข้าไป
            snake.unshift(newHead);
        }

        // ฟังก์ชันตรวจสอบการชนตัวเอง
        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) {
                    return true;
                }
            }
            return false;
        }

        // 4. จบเกม บันทึกคะแนน
        async function handleGameOver() {
            playGameOverSound();
            document.getElementById('gameOver').style.display = 'flex';
            document.getElementById('finalScore').textContent = score;

            // ถ้าทำลายสถิติ
            if (score > userHighScore) {
                document.getElementById('newRecordMsg').style.display = 'block';
                const user = firebase.auth().currentUser;
                if (user && scoreDocRef) {
                    try {
                        await scoreDocRef.set({
                            arcadeHighscores: { snake: score }
                        }, { merge: true });
                    } catch (e) {
                        console.error("Error saving score:", e);
                    }
                }
            }
        }

        // ระบบ Fullscreen
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable full-screen mode: ${err.message}`);
                });
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
                }
            }
        });

        // ฟังอีเวนต์การเปลี่ยนสถานะ Fullscreen (เผื่อผู้ใช้กด ESC ออก)
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        });

        // ==========================================
        // 🏆 Leaderboard ในห้องเรียน
        // ==========================================
        const leaderboardBtn = document.getElementById('leaderboardBtn');
        const leaderboardModal = document.getElementById('leaderboardModal');
        const leaderboardContent = document.getElementById('leaderboardContent');
        const closeLeaderboardBtn = document.getElementById('closeLeaderboardBtn');

        leaderboardBtn.addEventListener('click', async () => {
            leaderboardModal.classList.add('open');
            await loadLeaderboard();
        });
        closeLeaderboardBtn.addEventListener('click', () => leaderboardModal.classList.remove('open'));
        leaderboardModal.addEventListener('click', (e) => {
            if (e.target === leaderboardModal) leaderboardModal.classList.remove('open');
        });

        async function loadLeaderboard() {
            leaderboardContent.className = 'lb-loading';
            leaderboardContent.textContent = 'กำลังโหลด...';

            const user = firebase.auth().currentUser;
            if (!currentClassId || !user) {
                leaderboardContent.className = 'lb-empty';
                leaderboardContent.textContent = 'ไม่พบข้อมูลห้องเรียน';
                return;
            }

            try {
                // 1. ดึงรายชื่อผู้ลงทะเบียนทั้งหมดในห้องนี้ (query เดียว)
                const enrollSnapshot = await db.collection('class_enrollments')
                    .where('classId', '==', currentClassId)
                    .get();

                if (enrollSnapshot.empty) {
                    leaderboardContent.className = 'lb-empty';
                    leaderboardContent.textContent = 'ยังไม่มีข้อมูล';
                    return;
                }

                // 2. เอาเฉพาะคนที่มีคะแนนเกมงู แล้วดึงชื่อของทุกคนแบบขนานพร้อมกันทีเดียว
                //    (ไม่ใช้ for-loop + await ทีละคน เพื่อไม่ให้ช้าเวลามีนักเรียนเยอะ)
                const withScore = enrollSnapshot.docs
                    .map(doc => ({ studentId: doc.data().studentId, score: doc.data()?.arcadeHighscores?.snake || 0 }))
                    .filter(e => e.score > 0);

                const entries = await Promise.all(withScore.map(async (e) => {
                    try {
                        const userDoc = await db.collection('users').doc(e.studentId).get();
                        const name = userDoc.exists ? (userDoc.data().displayName || 'ไม่ระบุชื่อ') : 'ไม่ระบุชื่อ';
                        return { ...e, name };
                    } catch (err) {
                        return { ...e, name: 'ไม่ระบุชื่อ' };
                    }
                }));

                entries.sort((a, b) => b.score - a.score);
                const top = entries.slice(0, 10);

                if (top.length === 0) {
                    leaderboardContent.className = 'lb-empty';
                    leaderboardContent.textContent = 'ยังไม่มีใครทำคะแนนเกมงูในห้องนี้';
                    return;
                }

                leaderboardContent.className = '';
                leaderboardContent.innerHTML = top.map((e, idx) => {
                    const rank = idx + 1;
                    const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
                    const isMe = e.studentId === user.uid;
                    const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
                    return `
                        <div class="lb-row ${isMe ? 'me' : ''}">
                            <span class="lb-rank ${rankClass}">${medal}</span>
                            <span class="lb-name">${escapeLbHtml(e.name)}${isMe ? ' (คุณ)' : ''}</span>
                            <span class="lb-score">${e.score}</span>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('Error loading leaderboard:', e);
                leaderboardContent.className = 'lb-empty';
                leaderboardContent.textContent = 'โหลดข้อมูลไม่สำเร็จ';
            }
        }

        function escapeLbHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }
    </script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const classId = urlParams.get('classId');
        if (classId) {
            document.querySelectorAll('a[href="student-class-detail.html"]').forEach(a => {
                a.href = 'student-class-detail.html?id=' + classId;
            });
        }
    });
</script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        window.addEventListener('click', () => { window.focus(); });
        window.addEventListener('mousemove', () => { window.focus(); }, { once: true });
    });
</script>

    <script src="./session-timeout.js"></script>
