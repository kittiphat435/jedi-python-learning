    <script type="module">
        import { ADMIN_EMAILS } from './admin-config.js';

        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDWiPuk0WP9z5_mjDe1FkqeVZ-vcYClyLs",
            authDomain: "python-learning-platform-596e1.firebaseapp.com",
            projectId: "python-learning-platform-596e1",
            storageBucket: "python-learning-platform-596e1.firebasestorage.app",
            messagingSenderId: "5262153531",
            appId: "1:5262153531:web:55f6246093e1780003491e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ป้องกันปัญหา Firestore Offline Cache พังตอนไฟดับ/เน็ตตัด
        // หมายเหตุ: ต้องตั้งค่าก่อนเรียกใช้ฟังก์ชันอื่นๆ ของ db (ยกเว้น useEmulator)
        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        
        // ยกเลิกการใช้ Emulator ชั่วคราวเพื่อเชื่อมต่อฐานข้อมูลจริงเสมอ (แก้ปัญหา connection refused)
        /*
        if (isLocalhost) {
            db.useEmulator('localhost', 8080);
        } else {
        */
            // ห้ามตั้งค่า settings/persistence หลังเรียก useEmulator ใน SDK v8/v9-compat
            db.settings({
                cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED
            });
            db.enablePersistence({ synchronizeTabs: true }).catch((err) => {
                console.warn('Firestore persistence error (อาจเกิดจากเปิดหลายแท็บ หรือเบราว์เซอร์ไม่รองรับ):', err.code);
                if (err.code === 'failed-precondition') {
                    // เคลียร์แคชอัตโนมัติถ้าพัง
                    db.clearPersistence().catch(console.error);
                }
            });
        // }

        // ประกาศฟังก์ชันให้ใช้งานได้ทั่วไป
        window.handleRoleChange = handleRoleChange;
        window.handleSubjectChange = handleSubjectChange;
        window.submitRole = submitRole;

        let isProcessing = false;

        // Google Sign-in
        document.getElementById('googleLogin').addEventListener('click', async () => {
            if (isProcessing) return;
            isProcessing = true;

            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                console.log("Logged in user:", user.email);

                // เช็คว่าเป็น admin email หรือไม่
                if (ADMIN_EMAILS.includes(user.email)) {
                    // ถ้าเป็น admin ให้บันทึกข้อมูลและไปที่ admin dashboard
                    await db.collection('users').doc(user.uid).set({
                        role: 'admin',
                        email: user.email,
                        lastLogin: new Date()
                    }, { merge: true });
                    window.location.href = 'admin-dashboard.html';
                    return;
                }

                // เช็คว่าผู้ใช้มีข้อมูลใน Firestore หรือไม่
                const userDoc = await db.collection('users').doc(user.uid).get();

                if (!userDoc.exists) {
                    // ถ้าเป็นผู้ใช้ใหม่ ให้เลือก role
                    showRoleSelection(user.uid, user.email);
                } else {
                    // ถ้ามีข้อมูลแล้ว
                    const userData = userDoc.data();
                    // อัปเดตข้อมูลพื้นฐานจาก Auth (กันเคสเก่าที่ไม่ได้บันทึก email ลง Firestore)
                    try {
                        const patch = {
                            email: user.email || null,
                            photoURL: user.photoURL || null,
                            lastLogin: new Date()
                        };
                        if (!userData.displayName && user.displayName) {
                            patch.displayName = user.displayName;
                        }
                        await db.collection('users').doc(user.uid).set(patch, { merge: true });
                    } catch (e) {
                        console.error('Error updating basic user profile:', e);
                    }
                    redirectToRole(userData.role);
                }
            } catch (error) {
                console.error("Login error:", error);
                const message = String(error?.message || error);
                if (message.includes('client is offline')) {
                    alert('เชื่อมต่อฐานข้อมูล Firestore ไม่ได้ (offline)\n\nถ้าเปิดในเครื่อง: ให้รัน firebase emulators:start --only firestore\nหรือใช้ Local Emulator Suite (hosting+firestore)\nถ้าเปิดออนไลน์: ตรวจว่าเครือข่าย/ไฟร์วอลล์บล็อก firestore.googleapis.com หรือ Google APIs');
                } else {
                    alert('Error signing in: ' + message);
                }
            } finally {
                isProcessing = false;
            }
        });

        function showRoleSelection(userId, email) {
            const container = document.querySelector('.container');
            const currentHeader = container.querySelector('.header');

            container.innerHTML = `
        ${currentHeader.outerHTML}
        <div class="auth-form">
            <h2>เลือกประเภทผู้ใช้</h2>
            <p>อีเมล: ${email}</p>
            <div class="form-group">
                <select id="userRole" class="input-field" onchange="handleRoleChange()">
                    <option value="">เลือกประเภทผู้ใช้</option>
                    <option value="teacher">ครู</option>
                    <option value="student">นักเรียน</option>
                </select>
            </div>

            <!-- ฟอร์มข้อมูลครู -->
            <div id="teacherForm" style="display: none;">
                <!-- ... โค้ดฟอร์มครูเดิม ... -->
            </div>

            <!-- เพิ่มฟอร์มข้อมูลนักเรียน -->
            <div id="studentForm" style="display: none;">
                <div class="form-group">
                    <label for="studentName">ชื่อ-นามสกุล *</label>
                    <input type="text" id="studentName" class="input-field" required>
                </div>

                <div class="form-group">
                    <label for="studentSchool">โรงเรียน *</label>
                    <input type="text" id="studentSchool" class="input-field" required>
                </div>

                <div class="form-group">
                    <label for="studentGrade">ระดับชั้น *</label>
                    <select id="studentGrade" class="input-field" required>
                        <option value="">เลือกระดับชั้น</option>
                        <optgroup label="ประถมศึกษา">
                            <option value="ป.1">ประถมศึกษาปีที่ 1</option>
                            <option value="ป.2">ประถมศึกษาปีที่ 2</option>
                            <option value="ป.3">ประถมศึกษาปีที่ 3</option>
                            <option value="ป.4">ประถมศึกษาปีที่ 4</option>
                            <option value="ป.5">ประถมศึกษาปีที่ 5</option>
                            <option value="ป.6">ประถมศึกษาปีที่ 6</option>
                        </optgroup>
                        <optgroup label="มัธยมศึกษาตอนต้น">
                            <option value="ม.1">มัธยมศึกษาปีที่ 1</option>
                            <option value="ม.2">มัธยมศึกษาปีที่ 2</option>
                            <option value="ม.3">มัธยมศึกษาปีที่ 3</option>
                        </optgroup>
                        <optgroup label="มัธยมศึกษาตอนปลาย">
                            <option value="ม.4">มัธยมศึกษาปีที่ 4</option>
                            <option value="ม.5">มัธยมศึกษาปีที่ 5</option>
                            <option value="ม.6">มัธยมศึกษาปีที่ 6</option>
                        </optgroup>
                    </select>
                </div>

                <div class="form-group">
                    <label for="studentAge">อายุ *</label>
                    <input type="number" id="studentAge" class="input-field" min="6" max="20" required>
                </div>
            </div>

            <button onclick="submitRole('${userId}')" class="submit-btn">ยืนยัน</button>
        </div>
    `;
        }

        function handleSubjectChange() {
            const subjectSelect = document.getElementById('subject');
            const otherSubjectGroup = document.getElementById('otherSubjectGroup');
            const otherSubjectInput = document.getElementById('otherSubject');

            if (subjectSelect.value === 'other') {
                otherSubjectGroup.style.display = 'block';
                otherSubjectInput.required = true;
            } else {
                otherSubjectGroup.style.display = 'none';
                otherSubjectInput.required = false;
                otherSubjectInput.value = '';
            }
        }

        function handleRoleChange() {
            const roleSelect = document.getElementById('userRole');
            const teacherForm = document.getElementById('teacherForm');
            const studentForm = document.getElementById('studentForm');

            if (roleSelect.value === 'teacher') {
                teacherForm.style.display = 'block';
                studentForm.style.display = 'none';
                // รีเซ็ต required สำหรับฟอร์มนักเรียน
                document.getElementById('studentName').required = false;
                document.getElementById('studentSchool').required = false;
                document.getElementById('studentGrade').required = false;
                document.getElementById('studentAge').required = false;
            } else if (roleSelect.value === 'student') {
                teacherForm.style.display = 'none';
                studentForm.style.display = 'block';
                // รีเซ็ต required สำหรับฟอร์มครู
                document.getElementById('school').required = false;
                document.getElementById('teachingLevel').required = false;
                document.getElementById('subject').required = false;
            } else {
                teacherForm.style.display = 'none';
                studentForm.style.display = 'none';
            }
        }

        async function submitRole(userId) {
            if (isProcessing) return;
            isProcessing = true;

            try {
                const role = document.getElementById('userRole').value;
                if (!role) {
                    alert('กรุณาเลือกประเภทผู้ใช้');
                    return;
                }

                let userData = {
                    role: role,
                    createdAt: new Date(),
                    email: auth.currentUser?.email || null,
                    photoURL: auth.currentUser?.photoURL || null,
                    lastLogin: new Date()
                };

                if (role === 'teacher') {
                    const school = document.getElementById('school').value.trim();
                    const teachingLevel = document.getElementById('teachingLevel').value;
                    const subject = document.getElementById('subject').value;
                    const otherSubject = document.getElementById('otherSubject')?.value.trim();

                    if (!school || !teachingLevel || !subject) {
                        alert('กรุณากรอกข้อมูลให้ครบถ้วน');
                        return;
                    }

                    if (subject === 'other' && !otherSubject) {
                        alert('กรุณาระบุวิชาที่สอน');
                        return;
                    }

                    userData = {
                        ...userData,
                        school: school,
                        teachingLevel: teachingLevel,
                        subject: subject === 'other' ? otherSubject : subject
                    };
                    if (!userData.displayName && auth.currentUser?.displayName) {
                        userData.displayName = auth.currentUser.displayName;
                    }
                } else if (role === 'student') {
                    const name = document.getElementById('studentName').value.trim();
                    const school = document.getElementById('studentSchool').value.trim();
                    const grade = document.getElementById('studentGrade').value;
                    const age = document.getElementById('studentAge').value;

                    if (!name || !school || !grade || !age) {
                        alert('กรุณากรอกข้อมูลให้ครบถ้วน');
                        return;
                    }

                    userData = {
                        ...userData,
                        displayName: name,
                        school: school,
                        grade: grade,
                        age: parseInt(age)
                    };
                }

                await db.collection('users').doc(userId).set(userData);
                redirectToRole(role);
            } catch (error) {
                console.error("Error saving role:", error);
                alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล: ' + error.message);
            } finally {
                isProcessing = false;
            }
        }

        function redirectToRole(role) {
            switch (role) {
                case 'admin':
                    window.location.href = 'admin-dashboard.html';
                    break;
                case 'teacher':
                    window.location.href = 'teacher-dashboard.html';
                    break;
                case 'student':
                    window.location.href = 'student-dashboard.html';
                    break;
                default:
                    console.error('Invalid role:', role);
                    alert('เกิดข้อผิดพลาด: ไม่พบข้อมูลประเภทผู้ใช้');
            }
        }

        // เช็คสถานะการล็อกอินเมื่อโหลดหน้า
        auth.onAuthStateChanged((user) => {
            if (user) {
                if (ADMIN_EMAILS.includes(user.email)) {
                    window.location.href = 'admin-dashboard.html';
                    return;
                }

                // เช็คว่ามีข้อมูล role หรือไม่ก่อน redirect
                db.collection('users').doc(user.uid).get()
                    .then((doc) => {
                        if (doc.exists && doc.data().role) {
                            redirectToRole(doc.data().role);
                        }
                    })
                    .catch((error) => {
                        console.error("Error checking user role:", error);
                    });
            }
        });
    </script>

    <script>
        (() => {
            const themes = ['accent-cyan', 'accent-purple', 'accent-emerald', 'accent-amber', 'accent-red'];
            const themeLabel = {
                'accent-cyan': 'Cyan',
                'accent-purple': 'Purple',
                'accent-emerald': 'Emerald',
                'accent-amber': 'Amber',
                'accent-red': 'Red'
            };

            const applyTheme = (theme) => {
                themes.forEach(t => document.body.classList.remove(t));
                document.body.classList.add(theme);
                const btn = document.getElementById('accentCycleBtn');
                if (btn) btn.textContent = `โทนสี: ${themeLabel[theme] || theme}`;
                try { localStorage.setItem('loginAccentTheme', theme); } catch (_) {}
            };

            let saved = '';
            try { saved = localStorage.getItem('loginAccentTheme') || ''; } catch (_) {}
            applyTheme(themes.includes(saved) ? saved : 'accent-purple');

            const cycleBtn = document.getElementById('accentCycleBtn');
            if (cycleBtn) {
                cycleBtn.addEventListener('click', () => {
                    const current = themes.find(t => document.body.classList.contains(t)) || 'accent-cyan';
                    const next = themes[(themes.indexOf(current) + 1) % themes.length];
                    applyTheme(next);
                });
            }

            const canvas = document.getElementById('codeWarpCanvas');
            if (!canvas) return;
            const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (reduceMotion) return;
            const ctx = canvas.getContext('2d', { alpha: true });
            if (!ctx) return;

            const charset = '01{}[]();<>/*+-=|&^%$#@!?~.:,';
            const colors = ['#6EE7FF', '#A78BFA', '#34D399', '#F472B6'];
            const depth = 1800;
            const fov = 520;
            const speedMin = 4.2;
            const speedMax = 15.4;
            const dprCap = 2;

            let w = 0;
            let h = 0;
            let cx = 0;
            let cy = 0;
            let glyphs = [];
            let rafId = 0;
            let lastTs = 0;

            const rand = (min, max) => min + Math.random() * (max - min);
            const pick = (s) => s[Math.floor(Math.random() * s.length)];

            const resetGlyph = (g) => {
                g.x = rand(-cx, cx);
                g.y = rand(-cy, cy);
                g.z = rand(depth * 0.25, depth);
                g.v = rand(speedMin, speedMax);
                g.c = pick(colors);
                g.ch = pick(charset);
                g.tw = rand(0.015, 0.09);
                g.ph = rand(0, Math.PI * 2);
            };

            const resize = () => {
                w = Math.max(320, window.innerWidth || 0);
                h = Math.max(320, window.innerHeight || 0);
                cx = w / 2;
                cy = h / 2;

                const dpr = Math.min(window.devicePixelRatio || 1, dprCap);
                canvas.width = Math.floor(w * dpr);
                canvas.height = Math.floor(h * dpr);
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

                const target = Math.min(900, Math.max(220, Math.floor(((w * h) / 2200) * 0.5)));
                if (glyphs.length === 0) {
                    glyphs = new Array(target).fill(null).map(() => ({}));
                    glyphs.forEach(resetGlyph);
                } else if (glyphs.length < target) {
                    const add = new Array(target - glyphs.length).fill(null).map(() => ({}));
                    add.forEach(resetGlyph);
                    glyphs = glyphs.concat(add);
                } else if (glyphs.length > target) {
                    glyphs = glyphs.slice(0, target);
                }
            };

            const draw = (ts) => {
                rafId = requestAnimationFrame(draw);
                const dt = Math.min(0.05, (ts - (lastTs || ts)) / 1000);
                lastTs = ts;

                ctx.clearRect(0, 0, w, h);

                const t = ts / 1000;
                const rot = Math.sin(t * 0.22) * 0.18;
                const cos = Math.cos(rot);
                const sin = Math.sin(rot);

                ctx.globalCompositeOperation = 'lighter';

                for (let i = 0; i < glyphs.length; i++) {
                    const g = glyphs[i];
                    g.z -= g.v * (1 + dt * 30);
                    if (g.z <= 40) {
                        resetGlyph(g);
                        continue;
                    }

                    g.ph += g.tw;
                    if (g.ph > Math.PI * 2) g.ph -= Math.PI * 2;
                    if (Math.random() < 0.04) g.ch = pick(charset);

                    const rx = g.x * cos - g.y * sin;
                    const ry = g.x * sin + g.y * cos;
                    const wobble = Math.sin(g.ph) * 12;

                    const scale = fov / g.z;
                    const sx = cx + (rx + wobble) * scale;
                    const sy = cy + ry * scale;
                    if (sx < -80 || sx > w + 80 || sy < -80 || sy > h + 80) continue;

                    const alpha = Math.min(1, Math.max(0, 1 - g.z / depth));
                    const fontSize = Math.min(52, Math.max(12, 10 + scale * 42));
                    ctx.globalAlpha = alpha * 0.85;
                    ctx.fillStyle = g.c;
                    ctx.font = `600 ${fontSize}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace`;
                    ctx.fillText(g.ch, sx, sy);
                }

                ctx.globalAlpha = 1;
                ctx.globalCompositeOperation = 'source-over';
                const grd = ctx.createRadialGradient(cx, cy, Math.min(w, h) * 0.05, cx, cy, Math.max(w, h) * 0.75);
                grd.addColorStop(0, 'rgba(18,18,18,0)');
                grd.addColorStop(1, 'rgba(18,18,18,0.82)');
                ctx.fillStyle = grd;
                ctx.fillRect(0, 0, w, h);
            };

            const onVisibility = () => {
                if (document.hidden) {
                    if (rafId) cancelAnimationFrame(rafId);
                    rafId = 0;
                    lastTs = 0;
                } else if (!rafId) {
                    rafId = requestAnimationFrame(draw);
                }
            };

            resize();
            window.addEventListener('resize', resize);
            document.addEventListener('visibilitychange', onVisibility);
            rafId = requestAnimationFrame(draw);
        })();
    </script>
    <script>
        (() => {
            const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (reduceMotion) return;

            const el = document.getElementById('spaceCat');
            if (!el) return;

            let w = Math.max(320, window.innerWidth || 0);
            let h = Math.max(320, window.innerHeight || 0);
            const rand = (min, max) => min + Math.random() * (max - min);

            let x = rand(0, Math.max(0, w - 320));
            let y = rand(0, Math.max(0, h - 320));
            let vx = (Math.random() < 0.5 ? -1 : 1) * rand(44, 74);
            let vy = (Math.random() < 0.5 ? -1 : 1) * rand(34, 64);
            let lastTs = 0;
            let rot = rand(-12, 12);
            let vrot = rand(-22, 22);

            const resize = () => {
                w = Math.max(320, window.innerWidth || 0);
                h = Math.max(320, window.innerHeight || 0);
                const cw = el.offsetWidth || 96;
                const ch = el.offsetHeight || 96;
                x = Math.max(0, Math.min(x, w - cw));
                y = Math.max(0, Math.min(y, h - ch));
            };

            const step = (ts) => {
                const cw = el.offsetWidth || 96;
                const ch = el.offsetHeight || 96;
                const dt = Math.min(0.05, (ts - (lastTs || ts)) / 1000);
                lastTs = ts;

                x += vx * dt;
                y += vy * dt;
                rot += vrot * dt;

                if (x <= 0) {
                    x = 0;
                    vx = Math.abs(vx);
                    vrot = rand(-28, 28);
                } else if (x + cw >= w) {
                    x = w - cw;
                    vx = -Math.abs(vx);
                    vrot = rand(-28, 28);
                }

                if (y <= 0) {
                    y = 0;
                    vy = Math.abs(vy);
                    vrot = rand(-28, 28);
                } else if (y + ch >= h) {
                    y = h - ch;
                    vy = -Math.abs(vy);
                    vrot = rand(-28, 28);
                }

                const wobble = Math.sin(ts / 800) * 2.5;
                el.style.transform = `translate3d(${x}px, ${y}px, 0) rotate(${rot + wobble}deg)`;

                requestAnimationFrame(step);
            };

            resize();
            window.addEventListener('resize', resize);
            requestAnimationFrame(step);
        })();
    </script>
</body>
