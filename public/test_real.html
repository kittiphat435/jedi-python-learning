<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="guiPreview"></div>
    <script src="student-gui.js"></script>
    <script>
        const pyCode = `
from tkinter import * 
def cal(): 
    A1=int(number1.get()) 
    A2=int(number2.get()) 
    C.config(text=f' A1+A2 { A1+A2 }') 

root = Tk() 
root.title("test") 
root.geometry("550x200") 
B=Label(text='5555555555',fg='#FFFFCC',bg='blue') 
B.pack() 
A=Label(text='4444444444',fg='#FFFFCC',bg='blue') 
A.pack() 
C=Label(text='3333333333',fg='#FFFFCC',bg='blue') 
C.pack() 
number1=StringVar(value='2529') 
input1=Entry(root,textvariable=number1) 
input1.pack() 
number2=StringVar(value='2569') 
input2=Entry(root,textvariable=number2) 
input2.pack() 
button1=Button(text='calc') 
button1.pack() 
button1.configure(command=cal) 
root.mainloop() 
        `;

        document.addEventListener('DOMContentLoaded', () => {
            const previewDiv = document.getElementById('guiPreview');
            const { htmlOutput, jsCode } = convertTkinterToHtml(pyCode);
            previewDiv.innerHTML = `
                <div class="gui-preview">
                    ${htmlOutput}
                </div>
            `;
            const scriptEl = document.createElement('script');
            scriptEl.textContent = jsCode;
            previewDiv.appendChild(scriptEl);
        });
    </script>

    <script src="./session-timeout.js"></script>
</body>
</html>
