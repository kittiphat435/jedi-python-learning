<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียดห้องเรียน | Python Learning Platform</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./student-class-detail.css">
</head>

<body>
    <div class="container">
        <!-- Updated Header -->
        <div class="header dark-theme">
            <div class="logo-section">
                <img src="logo.png" alt="JediCode Logo" class="main-logo">
                <div class="brand-text">
                    <h1>JediCode</h1>
                    <p class="tagline">coding interactive</p>
                </div>
            </div>

            <div class="platform-logos">
                <img src="https://www.python.org/static/community_logos/python-logo-generic.svg" alt="Python Logo"
                    class="python-logo">
                <img src="https://www.gstatic.com/mobilesdk/160503_mobilesdk/logo/2x/firebase_28dp.png"
                    alt="Firebase Logo" class="firebase-logo">
            </div>

            <a href="student-dashboard.html" class="back-btn">กลับ</a>
        </div>

        <!-- Class Info (Will be replaced by JS) -->
        <div class="section class-info" style="padding: 0; background: none; box-shadow: none; margin-bottom: 0;">
            <!-- Content will be injected here by displayAdminInfo() -->
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div id="totalProblems" class="stat-number">0</div>
                <div>โจทย์ทั้งหมด</div>
            </div>

            <div class="stat-card">
                <div id="completedProblems" class="stat-number">0</div>
                <div>โจทย์ที่ทำสำเร็จ</div>
            </div>

            <div class="stat-card">
                <div id="problemProgress" class="stat-number">0%</div>
                <div>ความคืบหน้า</div>
            </div>

            <div class="stat-card">
                <div id="totalScore" class="stat-number">0/0</div>
                <div>
                    คะแนนรวม
                    <span id="scorePercentage" class="score-percentage">(0%)</span>
                </div>
            </div>

        </div>



        <!-- Problems Section -->
        <div class="section">
            <div class="section-header">
                <h2>โจทย์ในห้องเรียน</h2>
                <div class="search-box">
                    <input type="text" id="searchProblem" placeholder="ค้นหาโจทย์...">
                </div>
            </div>
            <div id="problemList" class="problem-list">
                <!-- จะถูกเติมด้วย JavaScript -->
            </div>
        </div>

        <!-- Progress Chart -->
        <div class="section">
            <h2>ความคืบหน้าของฉัน</h2>
            <div class="progress-chart">
                <canvas id="progressChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Custom JavaScript -->
    <script src="./student-problem-admin.js"></script>

    <script src="./session-timeout.js"></script>
</body>

</html>
