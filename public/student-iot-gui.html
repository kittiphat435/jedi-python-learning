<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JediCode</title>
    <!-- Prevent favicon 404 error from blocking page load -->
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    
    <script>
        // สร้าง Policy เพื่ออนุญาตให้ใส่ HTML/Script ลงใน iframe ได้
        if (window.trustedTypes && window.trustedTypes.createPolicy) {
            if (!window.trustedTypes.defaultPolicy) {
                try {
                    window.trustedTypes.createPolicy('default', {
                        createHTML: (string) => string,
                        createScript: (string) => string,
                        createScriptURL: (string) => string,
                    });
                } catch (e) {
                    console.warn('Trusted Types Policy creation failed:', e);
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="student-gui.css"> 
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/themes/prism-tomorrow.min.css" rel="stylesheet" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/prism.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/components/prism-python.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js" defer></script>
</head>

<body>
    <textarea id="pythonInput" style="display:none"></textarea>
    <textarea id="htmlOutput" style="display:none;"></textarea>
    <textarea id="html-editor" style="display:none;"></textarea>
    <textarea id="css-editor" style="display:none;"></textarea>
    <textarea id="js-editor" style="display:none;"></textarea>

    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="logo.png" alt="JediCode Logo" onerror="this.style.display='none'">
                <h1>JediCode</h1>
            </div>
            
            <div class="score-display">
                <div class="score-container">
                    <div class="score-text">คะแนน</div>
                    <div class="score-value">
                        <span id="currentScore">0</span>/<span id="maxScore">0</span>
                    </div>
                    <div class="score-percentage" id="scorePercentage">0%</div>
                </div>
            </div>

            <button id="backBtn" class="back-btn">กลับสู่หน้าห้องเรียน</button>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <div class="split-layout">
            <!-- Left Panel: IoT Hardware (Wokwi) -->
            <div class="panel hardware-panel">
                <div class="panel-header">
                    <h2>1. จำลองฮาร์ดแวร์ IoT (Wokwi)</h2>
                </div>
                <div class="panel-content">
                    <div id="problemDescription" class="problem-description"></div>
                    <div class="wokwi-wrapper" style="width: 100%; height: 500px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; margin-top: 10px;">
                        <div id="wokwiContainer" class="wokwi-container" style="width: 100%; height: 100%;">
                            <!-- Wokwi iframe will be injected here -->
                        </div>
                    </div>
                    <div class="requirements-section" style="margin-top: 20px;">
                      <h3>ข้อกำหนดของ GUI</h3>
                      <div id="requirementsList" class="requirements-list"></div>
                    </div>
                    <div class="testcases-section" style="margin-top: 20px;">
                      <h3>Test Cases</h3>
                      <div id="guiTestCasesList" class="testcases-list"></div>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Python GUI Software -->
            <div class="panel software-panel">
                <div class="panel-header">
                    <h2>2. เขียนโปรแกรม Python GUI</h2>
                </div>
                <div class="panel-content software-split">
                    <div class="editor-area">
                        <div id="codeEditor"></div>
                        <div class="button-container">
                            <span id="executionStatus" style="display:none; margin-right:10px; padding: 6px 12px; border-radius: 4px; font-size: 0.9rem; font-weight: bold;"></span>
                            <button id="checkBtn" class="action-btn">ตรวจสอบโค้ด</button>
                            <button id="convertBtn" class="action-btn">แสดง GUI</button>
                            <button id="testBtn" class="action-btn">ตรวจคำตอบ</button>
                            <button id="submitBtn" class="action-btn" disabled>ส่งงาน</button>
                            <button id="resetBtn" class="control-btn" style="background-color: #607d8b; color: white; margin-left: 10px;"><i class="fas fa-undo"></i> Reset Code</button>
                        </div>
                    </div>

                    <div class="preview-area">
                        <div class="preview-header">
                            <h3>หน้าจอแสดงผล GUI (จำลอง)</h3>
                        </div>
                        <div id="guiPreview" style="display: none;"></div>
                        <iframe id="result-frame" class="result-frame"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden element -->
    <div id="guiImagePreview" style="display: none;"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js" defer></script>

    <!-- Load Paho MQTT library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>

    <script src="student-iot-gui.js" defer></script>

    <script src="./session-timeout.js"></script>
</body>
</html>
