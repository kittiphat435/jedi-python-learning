<!DOCTYPE html>
<html>

<head>
    <title>Student Dashboard - Python Learning Platform</title>
    <link rel="stylesheet" href="student-dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="header dark-theme">
            <div class="logo-section">
                <img src="logo.png" alt="JediCode Logo" class="main-logo">
                <div class="brand-text">
                    <h1>JediCode</h1>
                    <p class="tagline">coding interactive</p>
                </div>
            </div>

            <div class="platform-logos">
                <img src="https://www.python.org/static/community_logos/python-logo-generic.svg" alt="Python Logo"
                    class="python-logo">
                <img src="https://www.gstatic.com/mobilesdk/160503_mobilesdk/logo/2x/firebase_28dp.png"
                    alt="Firebase Logo" class="firebase-logo">
            </div>
        </div>

        <!-- ข้อมูลผู้ใช้ -->
        <div class="user-info">
            <div>
                <span id="userEmail"></span>
                <div id="displayName">
                    <span id="userName"></span>
                    <button id="editNameBtn" class="edit-btn">แก้ไขชื่อ</button>
                </div>
                <div id="editNameForm" style="display: none;">
                    <input type="text" id="newName" class="input-field" placeholder="ใส่ชื่อที่ต้องการ">
                    <button id="saveNameBtn" class="primary-btn">บันทึก</button>
                    <button id="cancelEditBtn" class="secondary-btn">ยกเลิก</button>
                </div>
            </div>
            <button id="logoutBtn" class="logout-btn">ออกจากระบบ</button>
        </div>

        <!-- เข้าร่วมห้องเรียน -->
        <div class="section">
            <h2>เข้าร่วมห้องเรียน</h2>
            <div class="join-class-form">
                <input type="text" id="classCode" placeholder="ใส่รหัสห้องเรียน" class="input-field">
                <button id="joinClassBtn" class="primary-btn">เข้าร่วม</button>
            </div>
        </div>

        <!-- ทำโจทย์จาก Admin -->
        <div class="section">
            <h2>โจทย์พิเศษ</h2>
            <div class="admin-problem-section">
                <p>ทำโจทย์และคำถามที่ Admin สร้างขึ้นสำหรับนักเรียนทุกคน</p>
                <button id="adminProblemBtn" class="primary-btn admin-btn" onclick="window.location.href='student-problem-admin.html'">ทำโจทย์จาก Admin</button>
            </div>
        </div>

        <!-- สถิติ -->
        <div class="stats">
            <div class="stat-card">
                <div id="classCount" class="stat-number">0</div>
                <div>ห้องเรียน</div>
            </div>
            <div class="stat-card">
                <div id="problemCount" class="stat-number">0</div>
                <div>โจทย์ทั้งหมด</div>
            </div>
            <div class="stat-card">
                <div id="solvedCount" class="stat-number">0</div>
                <div>โจทย์ที่ทำสำเร็จ</div>
            </div>
        </div>

        <!-- รายการห้องเรียน -->
        <div class="section">
            <h2>ห้องเรียนของฉัน</h2>
            <div id="classList" class="class-list">
                <!-- รายการห้องเรียนจะถูกเพิ่มที่นี่ด้วย JavaScript -->
            </div>
        </div>


    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="student-dashboard.js"></script>
</body>

</html>
