<!DOCTYPE html>
<html>

<head>
    <title>Python Code Editor</title>
    <link href="student-problem-detail.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/components/prism-python.min.js"></script>
</head>

<body>
    <div class="container">
        <!-- Main Header with Dark Theme -->
        <div class="header dark-theme">
            <div class="logo-section">
                <img src="logo.png" alt="JediCode Logo" class="main-logo">
                <div class="brand-text">
                    <h1>JediCode</h1>
                    <p class="tagline">coding interactive</p>
                </div>
            </div>

            <div class="platform-logos">
                <img src="https://www.python.org/static/community_logos/python-logo-generic.svg" alt="Python Logo"
                    class="python-logo">
                <img src="https://www.gstatic.com/mobilesdk/160503_mobilesdk/logo/2x/firebase_28dp.png"
                    alt="Firebase Logo" class="firebase-logo">
            </div>
        </div>

        <!-- Sub Header with Controls -->
        <header class="sub-header">
            <div class="header-left">
                <a href="student-dashboard.html" class="back-button">← กลับ</a>
                <button id="themeToggle" class="theme-toggle">
                    <span class="toggle-track">
                        <span class="sun-icon">🌞</span>
                        <span class="moon-icon">🌙</span>
                        <span class="toggle-indicator"></span>
                    </span>
                </button>
                <div class="title-badges">
                    <h1 id="problemTitle" class="problem-title"></h1>
                    <div class="badges">
                        <span id="statusBadge" class="status-badge"></span>
                    </div>
                </div>
            </div>

            <div class="header-right">
                <span id="statusBadge" class="status-badge"></span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Problem Panel -->
            <div class="problem-panel">
                <section class="problem-description">
                    <h2>คำอธิบายโจทย์</h2>
                    <div class="max-score"></div> <!-- เพิ่มตรงนี้ -->
                    <div id="problemDescription"></div>
                </section>

                <section class="test-cases">
                    <h2>ตัวอย่าง Input/Output</h2>
                    <div id="exampleTestCases"></div>
                </section>

                <section id="hintsSection" class="hints">
                    <h2>คำแนะนำ</h2>
                    <div id="hints"></div>
                </section>
            </div>

            <!-- Editor Panel -->
            <div class="editor-panel">
                <section class="code-section">
                    <div class="code-header">
                        <h2>โค้ดของคุณ</h2>
                        <div class="code-actions">
                            <button onclick="runCode()" class="primary-button">รันโค้ด</button>
                            <button onclick="testCode()" class="success-button">ตรวจคำตอบ</button>
                            <button onclick="resetCode()" class="secondary-button">รีเซ็ตโค้ด</button>
                        </div>
                    </div>

                    <div class="code-editor-container">
                        <div id="lineNumbers" class="line-numbers">1</div>
                        <textarea id="codeEditor" class="code-input" spellcheck="false"></textarea>
                        <pre class="code-highlight"><code class="language-python"></code></pre>
                    </div>
                </section>

                <section class="results-section">
                    <h2>ผลการทดสอบ</h2>
                    <div id="testResults" class="test-results"></div>
                </section>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="submissionHistoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>ประวัติการส่งงาน</h2>
                <button onclick="closeModal()" class="close-btn">&times;</button>
            </div>
            <div id="submissionList" class="modal-body"></div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">กำลังทดสอบโค้ด...</div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="student-problem-detail.js"></script>
</body>

</html>
