<!DOCTYPE html>
<html>

<head>
    <title>Python Learning Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="header dark-theme">
            <div class="logo-section">
                <img src="logo.png" alt="JediCode Logo" class="main-logo">
                <div class="brand-text">
                    <h1>JediCode</h1>
                    <p class="tagline">coding interactive</p>
                </div>
            </div>

            <div class="platform-logos">
                <img src="https://www.python.org/static/community_logos/python-logo-generic.svg" alt="Python Logo"
                    class="python-logo">
                <img src="https://www.gstatic.com/mobilesdk/160503_mobilesdk/logo/2x/firebase_28dp.png"
                    alt="Firebase Logo" class="firebase-logo">
            </div>
        </div>

        <!-- ส่วน login -->
        <div class="auth-form" id="loginForm">
            <h2>เข้าสู่ระบบ</h2>
            <button id="googleLogin" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo">
                เข้าสู่ระบบด้วย Google
            </button>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- Custom Scripts -->
    <script type="module">
        import { ADMIN_EMAILS } from './admin-config.js';

        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDWiPuk0WP9z5_mjDe1FkqeVZ-vcYClyLs",
            authDomain: "python-learning-platform-596e1.firebaseapp.com",
            projectId: "python-learning-platform-596e1",
            storageBucket: "python-learning-platform-596e1.firebasestorage.app",
            messagingSenderId: "5262153531",
            appId: "1:5262153531:web:55f6246093e1780003491e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ประกาศฟังก์ชันให้ใช้งานได้ทั่วไป
        window.handleRoleChange = handleRoleChange;
        window.handleSubjectChange = handleSubjectChange;
        window.submitRole = submitRole;

        let isProcessing = false;

        // Google Sign-in
        document.getElementById('googleLogin').addEventListener('click', async () => {
            if (isProcessing) return;
            isProcessing = true;

            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                console.log("Logged in user:", user.email);

                // เช็คว่าเป็น admin email หรือไม่
                if (ADMIN_EMAILS.includes(user.email)) {
                    // ถ้าเป็น admin ให้บันทึกข้อมูลและไปที่ admin dashboard
                    await db.collection('users').doc(user.uid).set({
                        role: 'admin',
                        email: user.email,
                        lastLogin: new Date()
                    }, { merge: true });
                    window.location.href = 'admin-dashboard.html';
                    return;
                }

                // เช็คว่าผู้ใช้มีข้อมูลใน Firestore หรือไม่
                const userDoc = await db.collection('users').doc(user.uid).get();

                if (!userDoc.exists) {
                    // ถ้าเป็นผู้ใช้ใหม่ ให้เลือก role
                    showRoleSelection(user.uid, user.email);
                } else {
                    // ถ้ามีข้อมูลแล้ว
                    const userData = userDoc.data();
                    redirectToRole(userData.role);
                }
            } catch (error) {
                console.error("Login error:", error);
                alert('Error signing in: ' + error.message);
            } finally {
                isProcessing = false;
            }
        });

        function showRoleSelection(userId, email) {
            const container = document.querySelector('.container');
            const currentHeader = container.querySelector('.header');

            container.innerHTML = `
        ${currentHeader.outerHTML}
        <div class="auth-form">
            <h2>เลือกประเภทผู้ใช้</h2>
            <p>อีเมล: ${email}</p>
            <div class="form-group">
                <select id="userRole" class="input-field" onchange="handleRoleChange()">
                    <option value="">เลือกประเภทผู้ใช้</option>
                    <option value="teacher">ครู</option>
                    <option value="student">นักเรียน</option>
                </select>
            </div>

            <!-- ฟอร์มข้อมูลครู -->
            <div id="teacherForm" style="display: none;">
                <!-- ... โค้ดฟอร์มครูเดิม ... -->
            </div>

            <!-- เพิ่มฟอร์มข้อมูลนักเรียน -->
            <div id="studentForm" style="display: none;">
                <div class="form-group">
                    <label for="studentName">ชื่อ-นามสกุล *</label>
                    <input type="text" id="studentName" class="input-field" required>
                </div>

                <div class="form-group">
                    <label for="studentSchool">โรงเรียน *</label>
                    <input type="text" id="studentSchool" class="input-field" required>
                </div>

                <div class="form-group">
                    <label for="studentGrade">ระดับชั้น *</label>
                    <select id="studentGrade" class="input-field" required>
                        <option value="">เลือกระดับชั้น</option>
                        <optgroup label="ประถมศึกษา">
                            <option value="ป.1">ประถมศึกษาปีที่ 1</option>
                            <option value="ป.2">ประถมศึกษาปีที่ 2</option>
                            <option value="ป.3">ประถมศึกษาปีที่ 3</option>
                            <option value="ป.4">ประถมศึกษาปีที่ 4</option>
                            <option value="ป.5">ประถมศึกษาปีที่ 5</option>
                            <option value="ป.6">ประถมศึกษาปีที่ 6</option>
                        </optgroup>
                        <optgroup label="มัธยมศึกษาตอนต้น">
                            <option value="ม.1">มัธยมศึกษาปีที่ 1</option>
                            <option value="ม.2">มัธยมศึกษาปีที่ 2</option>
                            <option value="ม.3">มัธยมศึกษาปีที่ 3</option>
                        </optgroup>
                        <optgroup label="มัธยมศึกษาตอนปลาย">
                            <option value="ม.4">มัธยมศึกษาปีที่ 4</option>
                            <option value="ม.5">มัธยมศึกษาปีที่ 5</option>
                            <option value="ม.6">มัธยมศึกษาปีที่ 6</option>
                        </optgroup>
                    </select>
                </div>

                <div class="form-group">
                    <label for="studentAge">อายุ *</label>
                    <input type="number" id="studentAge" class="input-field" min="6" max="20" required>
                </div>
            </div>

            <button onclick="submitRole('${userId}')" class="submit-btn">ยืนยัน</button>
        </div>
    `;
        }

        function handleSubjectChange() {
            const subjectSelect = document.getElementById('subject');
            const otherSubjectGroup = document.getElementById('otherSubjectGroup');
            const otherSubjectInput = document.getElementById('otherSubject');

            if (subjectSelect.value === 'other') {
                otherSubjectGroup.style.display = 'block';
                otherSubjectInput.required = true;
            } else {
                otherSubjectGroup.style.display = 'none';
                otherSubjectInput.required = false;
                otherSubjectInput.value = '';
            }
        }

        function handleRoleChange() {
            const roleSelect = document.getElementById('userRole');
            const teacherForm = document.getElementById('teacherForm');
            const studentForm = document.getElementById('studentForm');

            if (roleSelect.value === 'teacher') {
                teacherForm.style.display = 'block';
                studentForm.style.display = 'none';
                // รีเซ็ต required สำหรับฟอร์มนักเรียน
                document.getElementById('studentName').required = false;
                document.getElementById('studentSchool').required = false;
                document.getElementById('studentGrade').required = false;
                document.getElementById('studentAge').required = false;
            } else if (roleSelect.value === 'student') {
                teacherForm.style.display = 'none';
                studentForm.style.display = 'block';
                // รีเซ็ต required สำหรับฟอร์มครู
                document.getElementById('school').required = false;
                document.getElementById('teachingLevel').required = false;
                document.getElementById('subject').required = false;
            } else {
                teacherForm.style.display = 'none';
                studentForm.style.display = 'none';
            }
        }

        async function submitRole(userId) {
            if (isProcessing) return;
            isProcessing = true;

            try {
                const role = document.getElementById('userRole').value;
                if (!role) {
                    alert('กรุณาเลือกประเภทผู้ใช้');
                    return;
                }

                let userData = {
                    role: role,
                    createdAt: new Date()
                };

                if (role === 'teacher') {
                    const school = document.getElementById('school').value.trim();
                    const teachingLevel = document.getElementById('teachingLevel').value;
                    const subject = document.getElementById('subject').value;
                    const otherSubject = document.getElementById('otherSubject')?.value.trim();

                    if (!school || !teachingLevel || !subject) {
                        alert('กรุณากรอกข้อมูลให้ครบถ้วน');
                        return;
                    }

                    if (subject === 'other' && !otherSubject) {
                        alert('กรุณาระบุวิชาที่สอน');
                        return;
                    }

                    userData = {
                        ...userData,
                        school: school,
                        teachingLevel: teachingLevel,
                        subject: subject === 'other' ? otherSubject : subject
                    };
                } else if (role === 'student') {
                    const name = document.getElementById('studentName').value.trim();
                    const school = document.getElementById('studentSchool').value.trim();
                    const grade = document.getElementById('studentGrade').value;
                    const age = document.getElementById('studentAge').value;

                    if (!name || !school || !grade || !age) {
                        alert('กรุณากรอกข้อมูลให้ครบถ้วน');
                        return;
                    }

                    userData = {
                        ...userData,
                        displayName: name,
                        school: school,
                        grade: grade,
                        age: parseInt(age)
                    };
                }

                await db.collection('users').doc(userId).set(userData);
                redirectToRole(role);
            } catch (error) {
                console.error("Error saving role:", error);
                alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล: ' + error.message);
            } finally {
                isProcessing = false;
            }
        }

        function redirectToRole(role) {
            switch (role) {
                case 'admin':
                    window.location.href = 'admin-dashboard.html';
                    break;
                case 'teacher':
                    window.location.href = 'teacher-dashboard.html';
                    break;
                case 'student':
                    window.location.href = 'student-dashboard.html';
                    break;
                default:
                    console.error('Invalid role:', role);
                    alert('เกิดข้อผิดพลาด: ไม่พบข้อมูลประเภทผู้ใช้');
            }
        }

        // เช็คสถานะการล็อกอินเมื่อโหลดหน้า
        auth.onAuthStateChanged((user) => {
            if (user) {
                if (ADMIN_EMAILS.includes(user.email)) {
                    window.location.href = 'admin-dashboard.html';
                    return;
                }

                // เช็คว่ามีข้อมูล role หรือไม่ก่อน redirect
                db.collection('users').doc(user.uid).get()
                    .then((doc) => {
                        if (doc.exists && doc.data().role) {
                            redirectToRole(doc.data().role);
                        }
                    })
                    .catch((error) => {
                        console.error("Error checking user role:", error);
                    });
            }
        });
    </script>
</body>

</html>
