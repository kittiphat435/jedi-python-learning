<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Tkinter GUI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .tk-window {
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
            background-color: #f9f9f9;
            width: 300px;
        }
        .tk-title-bar {
            background-color: #e0e0e0;
            padding: 5px;
            margin-bottom: 10px;
            border-radius: 2px;
        }
        .tk-title {
            font-weight: bold;
            text-align: center;
        }
        .tk-button {
            padding: 5px 10px;
            background-color: #e0e0e0;
            border: 1px solid #ccc;
            border-radius: 3px;
            cursor: pointer;
            margin: 5px 0;
            text-align: center;
            display: block;
            width: 100%;
        }
        .tk-button:hover {
            background-color: #d0d0d0;
        }
        .tk-label {
            padding: 5px;
            margin: 5px 0;
            text-align: center;
        }
        #event-log {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f5f5f5;
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
        }
        .event-item {
            margin-bottom: 5px;
            padding: 5px;
            border-bottom: 1px solid #eee;
        }
        .event-time {
            color: #666;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div>
        <div class="tk-window">
            <div class="tk-title-bar">
                <div class="tk-title">ทดสอบปุ่ม</div>
            </div>
            <button id="widget_1" class="tk-button">คลิกที่นี่</button>
            <div id="widget_2" class="tk-label">ผลลัพธ์จะแสดงที่นี่</div>
        </div>
        
        <div id="event-log"></div>
    </div>

    <script>
        // ฟังก์ชันสำหรับบันทึกเหตุการณ์
        function logEvent(message) {
            const eventLog = document.getElementById('event-log');
            const now = new Date();
            const timeString = now.toLocaleTimeString('th-TH', { hour12: false });
            
            const eventItem = document.createElement('div');
            eventItem.className = 'event-item';
            
            const eventTime = document.createElement('span');
            eventTime.className = 'event-time';
            eventTime.textContent = `[${timeString}] `;
            
            eventItem.appendChild(eventTime);
            eventItem.appendChild(document.createTextNode(message));
            
            eventLog.appendChild(eventItem);
            eventLog.scrollTop = eventLog.scrollHeight;
            
            console.log(`[${timeString}] ${message}`);
        }

        document.addEventListener('DOMContentLoaded', function() {
            // เพิ่ม event listener สำหรับปุ่ม
            document.getElementById('widget_1').addEventListener('click', function() {
                logEvent('Button clicked: คลิกที่นี่');
                logEvent('Widget details: {"type":"Button","name":"button","text":"คลิกที่นี่","command":"say_hello","id":"widget_1"}');
                logEvent('Executing say_hello');
                logEvent('Function body:     result_label.config(text="สวัสดี!") ');
                
                // อัปเดต Label
                document.getElementById('widget_2').textContent = 'สวัสดี!';
                logEvent('Widget result_label updated: text = "สวัสดี!"');
            });
            
            // เพิ่มการตรวจสอบการคลิกที่ส่วนอื่นๆ ของ GUI
            document.querySelector('.tk-window').addEventListener('click', function(event) {
                // ตรวจสอบว่าคลิกที่ปุ่มหรือไม่
                if (!event.target.classList.contains('tk-button')) {
                    logEvent('คลิกที่ส่วนอื่นๆ ของ GUI ที่ไม่ใช่ปุ่ม');
                    const statusElement = document.getElementById('status');
                    if (statusElement) {
                        statusElement.textContent = 'กรุณาคลิกที่ปุ่มเพื่อทดสอบการทำงาน';
                        statusElement.className = 'status';
                    }
                }
            });
            
            logEvent('GUI พร้อมใช้งานแล้ว กรุณาคลิกที่ปุ่ม "คลิกที่นี่" เพื่อทดสอบการทำงาน');
        });
    </script>
</body>
</html>
