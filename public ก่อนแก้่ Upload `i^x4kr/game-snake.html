<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Snake - JediCode Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { 
            margin: 0; padding: 0; 
            background-color: #2c3e50; 
            color: white; 
            font-family: 'Sarabun', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden;
        }
        
        /* สไตล์สำหรับปุ่ม Fullscreen */
        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            cursor: pointer;
            z-index: 100;
            transition: background 0.3s;
        }
        .fullscreen-btn:hover { background: rgba(255,255,255,0.4); }

        .header { 
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: 400px; margin-bottom: 20px; 
            box-sizing: border-box; padding: 0 10px;
        }
        .score-box {
            background: #34495e; padding: 10px 20px; border-radius: 8px; font-size: 1.2em; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .score-val { color: #2ecc71; font-size: 1.5em; }
        .highscore-val { color: #f1c40f; font-size: 1.5em; }
        
        canvas { 
            background-color: #ecf0f1; 
            border: 5px solid #bdc3c7; 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            max-width: 100%;
            height: auto;
        }
        
        .btn { 
            background-color: #e74c3c; color: white; border: none; 
            padding: 12px 24px; border-radius: 5px; cursor: pointer; 
            font-size: 1.1em; font-weight: bold; text-decoration: none; 
            display: inline-flex; align-items: center; gap: 8px;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn:hover { background-color: #c0392b; transform: scale(1.05); }
        .btn-secondary { background-color: #7f8c8d; }
        .btn-secondary:hover { background-color: #95a5a6; }
        
        #gameOver { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(44, 62, 80, 0.9); 
            flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 8px; text-align: center;
        }
        #gameOver h2 { color: #e74c3c; font-size: 3em; margin: 0 0 10px 0; text-shadow: 2px 2px 0 #000; }
        #newRecordMsg { color: #f1c40f; font-weight: bold; font-size: 1.5em; display: none; animation: pulse 1s infinite; }
        
        #startScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(236, 240, 241, 0.8); border-radius: 8px;
            color: #2c3e50; font-size: 1.5em; font-weight: bold; cursor: pointer;
            z-index: 5; text-align: center; flex-direction: column;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 60px);
            grid-gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }
        .control-btn {
            background: #34495e; color: white; border: none; border-radius: 10px;
            height: 60px; font-size: 24px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; touch-action: manipulation;
        }
        .control-btn:active { background: #2c3e50; }
        
        @media (max-width: 600px) {
            .mobile-controls { display: grid; }
            .keyboard-hint { display: none; }
        }
    </style>
</head>
<body>

    <!-- ปุ่ม Fullscreen -->
    <button id="fullscreenBtn" class="fullscreen-btn" title="เปิดเต็มจอ">
        <i class="fas fa-expand"></i>
    </button>

    <div class="header">
        <div class="score-box">คะแนน: <span id="score" class="score-val">0</span></div>
        <div class="score-box">สถิติสูงสุด: <span id="highScore" class="highscore-val">0</span></div>
    </div>

    <div style="position: relative; width: 100%; max-width: 400px;">
        <!-- Canvas 400x400 (20x20 Grid) -->
        <canvas id="gameCanvas" width="400" height="400" style="width: 100%; display: block;"></canvas>
        
        <div id="startScreen">
            <i class="fas fa-play-circle" style="font-size: 3em; color: #27ae60; margin-bottom: 10px;"></i>
            กดปุ่มทิศทาง<br>เพื่อเริ่มเกม
        </div>

        <div id="gameOver">
            <h2>GAME OVER</h2>
            <p style="font-size: 1.5em; margin-bottom: 5px;">คะแนนของคุณ: <span id="finalScore" style="color: #2ecc71; font-weight: bold;">0</span></p>
            <p id="newRecordMsg">🎉 ทำลายสถิติใหม่! 🎉</p>
            <div style="margin-top: 30px; display: flex; gap: 15px;">
                <a href="student-problem-admin.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> กลับโซน Arcade</a>
            </div>
        </div>
    </div>
    
    <div style="margin-top: 20px; color: #95a5a6; text-align: center;" class="keyboard-hint">
        <p><i class="fas fa-keyboard"></i> ใช้ปุ่มลูกศร (⬆️ ⬇️ ⬅️ ➡️) ในการบังคับงู</p>
    </div>

    <!-- Mobile D-pad -->
    <div class="mobile-controls">
        <div></div>
        <button class="control-btn" id="btn-up"><i class="fas fa-arrow-up"></i></button>
        <div></div>
        <button class="control-btn" id="btn-left"><i class="fas fa-arrow-left"></i></button>
        <button class="control-btn" id="btn-down"><i class="fas fa-arrow-down"></i></button>
        <button class="control-btn" id="btn-right"><i class="fas fa-arrow-right"></i></button>
    </div>

    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="config.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const box = 20; // ขนาดของตาราง 1 ช่อง
        
        let score = 0;
        let snake = [];
        snake[0] = { x: 9 * box, y: 10 * box }; // จุดเริ่มต้นงู

        // สุ่มตำแหน่งอาหาร (Bug)
        let food = { 
            x: Math.floor(Math.random() * 20) * box, 
            y: Math.floor(Math.random() * 20) * box 
        };
        
        // อาร์เรย์เก็บระเบิด
        let bombs = [];
        
        let d; // ทิศทาง
        let game;
        let isPlaying = false;
        let isCheckingTicket = false; // ตัวแปรป้องกันการกดรัวๆ
        let userHighScore = 0;
        const db = firebase.firestore();

        // 1. ตรวจสอบผู้ใช้และเริ่มเกม
        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                draw(); // วาดภาพเริ่มต้น
                // โหลด Highscore ของเกมงูจาก Firebase
                try {
                    const doc = await db.collection('users').doc(user.uid).get();
                    if (doc.exists && doc.data().arcadeHighscores && doc.data().arcadeHighscores.snake) {
                        userHighScore = doc.data().arcadeHighscores.snake;
                        document.getElementById('highScore').textContent = userHighScore;
                    }
                } catch(e) {
                    console.error("Error loading highscore:", e);
                }
                
                // รอให้ผู้ใช้กดปุ่มเพื่อเริ่มเดิน
                document.addEventListener('keydown', direction);
            } else {
                alert("กรุณาเข้าสู่ระบบ");
                window.location.href = "login.html";
            }
        });

        // 2. ควบคุมทิศทาง
        async function setDirection(newD) {
            if (!isPlaying && !isCheckingTicket) {
                isCheckingTicket = true; // ล็อกไม่ให้เข้ามาทำงานซ้ำ
                // เช็คตั๋วก่อนเริ่มเล่น
                const user = firebase.auth().currentUser;
                if (!user) {
                    isCheckingTicket = false;
                    return;
                }

                try {
                    // ดึงคะแนนทั้งหมดของนักเรียน
                    const submissionsSnapshot = await db.collection('submissions').where('studentId', '==', user.uid).get();
                    const latestSubmissions = new Map();
                    submissionsSnapshot.docs.filter(doc => !doc.data().classId || doc.data().classId === 'admin').forEach(doc => {
                        const data = doc.data();
                        const existing = latestSubmissions.get(data.problemId);
                        if (!existing || data.submittedAt.toDate() > existing.submittedAt.toDate()) {
                            latestSubmissions.set(data.problemId, data);
                        }
                    });

                    let totalScore = 0;
                    const adminProblemsSnapshot = await db.collection('problems').get(); // Assuming all problems are from admin for simplicity here, adjust if needed
                    for (const doc of adminProblemsSnapshot.docs) {
                        const problemId = doc.id;
                        const problemData = doc.data();
                        const submission = latestSubmissions.get(problemId);
                        
                        if (submission) {
                             if (problemData.type === 'flowchart' || problemData.type === 'gui') {
                                if (submission.status === 'completed') {
                                    totalScore += (submission.score > 0 ? submission.score : (submission.maxScore || 10));
                                }
                            } else if (submission.status === 'completed') {
                                totalScore += submission.score || 0;
                            }
                        }
                    }

                    const totalEarnedTickets = Math.floor(totalScore / 5);
                    
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    const usedTickets = userDoc.exists ? (userDoc.data().usedTickets || 0) : 0;
                    const availableTickets = Math.max(0, totalEarnedTickets - usedTickets);

                    if (availableTickets <= 0) {
                        alert('ตั๋วไม่พอ! กรุณาทำโจทย์เพิ่มเพื่อสะสมคะแนน (5 คะแนน = 1 ตั๋ว)');
                        window.location.href = 'student-problem-admin.html';
                        isCheckingTicket = false;
                        return;
                    }

                    // หักตั๋ว 1 ใบ
                    await db.collection('users').doc(user.uid).set({
                        usedTickets: usedTickets + 1
                    }, { merge: true });

                    isPlaying = true;
                    document.getElementById('startScreen').style.display = 'none';
                    game = setInterval(gameLoop, 120); // เริ่มเกม loop
                } catch (error) {
                    console.error("Error checking tickets:", error);
                    alert("เกิดข้อผิดพลาดในการตรวจสอบตั๋ว");
                    isCheckingTicket = false;
                    return;
                }
            }
            if(isPlaying) {
                if(newD == "LEFT" && d != "RIGHT") d = "LEFT";
                if(newD == "UP" && d != "DOWN") d = "UP";
                if(newD == "RIGHT" && d != "LEFT") d = "RIGHT";
                if(newD == "DOWN" && d != "UP") d = "DOWN";
            }
        }

        function direction(event) {
            if (event.keyCode == 37) setDirection("LEFT");
            else if (event.keyCode == 38) setDirection("UP");
            else if (event.keyCode == 39) setDirection("RIGHT");
            else if (event.keyCode == 40) setDirection("DOWN");
            
            // ป้องกันหน้าจอเลื่อนเวลาเล่น
            if([37, 38, 39, 40].includes(event.keyCode)) {
                event.preventDefault();
            }
        }

        // Event listeners สำหรับปุ่มบนมือถือ
        document.getElementById('btn-up').addEventListener('touchstart', (e) => { e.preventDefault(); setDirection("UP"); }, {passive: false});
        document.getElementById('btn-down').addEventListener('touchstart', (e) => { e.preventDefault(); setDirection("DOWN"); }, {passive: false});
        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); setDirection("LEFT"); }, {passive: false});
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); setDirection("RIGHT"); }, {passive: false});
        
        // รองรับการคลิกเมาส์ด้วยบน PC
        document.getElementById('btn-up').addEventListener('mousedown', (e) => { e.preventDefault(); setDirection("UP"); });
        document.getElementById('btn-down').addEventListener('mousedown', (e) => { e.preventDefault(); setDirection("DOWN"); });
        document.getElementById('btn-left').addEventListener('mousedown', (e) => { e.preventDefault(); setDirection("LEFT"); });
        document.getElementById('btn-right').addEventListener('mousedown', (e) => { e.preventDefault(); setDirection("RIGHT"); });

        document.getElementById('startScreen').addEventListener('click', () => {
            setDirection("RIGHT"); // เริ่มวิ่งไปทางขวาเมื่อกดปุ่มเริ่ม
        });

        // 3. วาดกราฟิกและอัปเดตลอจิก (ทำงานทุกๆ 120ms)
        function draw() {
            // เคลียร์หน้าจอ
            ctx.fillStyle = "#ecf0f1";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // วาดงู
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#27ae60" : "#2ecc71"; // หัวงูสีเข้ม ตัวสีอ่อน
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "#ecf0f1"; // เส้นขอบสีขาว
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            // วาดอาหาร (บั๊กแดง)
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(food.x, food.y, box, box);

            // วาดระเบิด (สีดำ)
            ctx.fillStyle = "#2c3e50";
            for (let i = 0; i < bombs.length; i++) {
                ctx.beginPath();
                ctx.arc(bombs[i].x + box/2, bombs[i].y + box/2, box/2 - 2, 0, Math.PI * 2);
                ctx.fill();
                // วาดชนวนระเบิด
                ctx.fillStyle = "#e74c3c";
                ctx.fillRect(bombs[i].x + box/2 - 2, bombs[i].y + 2, 4, 4);
                ctx.fillStyle = "#2c3e50"; // คืนสีเดิมเผื่อวาดลูกต่อไป
            }
        }

        function spawnBomb() {
            let newBomb;
            let isValid = false;
            // สุ่มที่เกิดจนกว่าจะได้ที่ไม่ทับงูและอาหาร
            while (!isValid) {
                newBomb = { 
                    x: Math.floor(Math.random() * 20) * box, 
                    y: Math.floor(Math.random() * 20) * box 
                };
                isValid = true;
                
                // เช็คว่าไม่ทับอาหาร
                if (newBomb.x === food.x && newBomb.y === food.y) isValid = false;
                
                // เช็คว่าไม่ทับงู
                for (let i = 0; i < snake.length; i++) {
                    if (newBomb.x === snake[i].x && newBomb.y === snake[i].y) isValid = false;
                }
                
                // เช็คว่าไม่ทับระเบิดลูกเดิม
                for (let i = 0; i < bombs.length; i++) {
                    if (newBomb.x === bombs[i].x && newBomb.y === bombs[i].y) isValid = false;
                }
            }
            bombs.push(newBomb);
        }

        function gameLoop() {
            draw();

            // คำนวณตำแหน่งหัวงูใหม่
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            // ตรวจสอบการกินอาหาร
            if (snakeX == food.x && snakeY == food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                // สุ่มอาหารใหม่
                food = { 
                    x: Math.floor(Math.random() * 20) * box, 
                    y: Math.floor(Math.random() * 20) * box 
                };
                
                // เพิ่มระเบิดใหม่ 1 ลูก ทุกๆ 30 คะแนน (กินอาหาร 3 ตัว)
                if (score % 30 === 0) {
                    spawnBomb();
                }
                // ไม่ต้อง pop หางทิ้ง ทำให้งูยาวขึ้น
            } else {
                // ลบหางออก (งูเดินไปข้างหน้า)
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            // ตรวจสอบ Game Over (ชนกำแพง, ชนตัวเอง หรือ ชนระเบิด)
            let hitBomb = false;
            for (let i = 0; i < bombs.length; i++) {
                if (snakeX === bombs[i].x && snakeY === bombs[i].y) {
                    hitBomb = true;
                    break;
                }
            }

            if (snakeX < 0 || snakeY < 0 || snakeX >= canvas.width || snakeY >= canvas.height || collision(newHead, snake) || hitBomb) {
                clearInterval(game);
                handleGameOver();
                return;
            }

            // เพิ่มหัวใหม่เข้าไป
            snake.unshift(newHead);
        }

        // ฟังก์ชันตรวจสอบการชนตัวเอง
        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) {
                    return true;
                }
            }
            return false;
        }

        // 4. จบเกม บันทึกคะแนน
        async function handleGameOver() {
            document.getElementById('gameOver').style.display = 'flex';
            document.getElementById('finalScore').textContent = score;
            
            // ถ้าทำลายสถิติ
            if (score > userHighScore) {
                document.getElementById('newRecordMsg').style.display = 'block';
                const user = firebase.auth().currentUser;
                if (user) {
                    try {
                        await db.collection('users').doc(user.uid).set({
                            arcadeHighscores: { snake: score }
                        }, { merge: true });
                    } catch (e) {
                        console.error("Error saving score:", e);
                    }
                }
            }
        }

        // ระบบ Fullscreen
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable full-screen mode: ${err.message}`);
                });
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
                }
            }
        });

        // ฟังอีเวนต์การเปลี่ยนสถานะ Fullscreen (เผื่อผู้ใช้กด ESC ออก)
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        });
    </script>
</body>
</html>
